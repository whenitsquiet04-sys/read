function renderAdventure() {
  const tbr = state.books.filter(b=>b.status==='tbr');
  if (!tbr.length) return `<div class="wheel-empty"><div style="font-size:48px;margin-bottom:12px">🎡</div><div>Your Want to Read shelf is empty!<br>Add some books first.</div></div>`;
  return `
    <div class="adventure-wrap">
      <div class="wheel-outer">
        <div class="wheel-pointer"></div>
        <canvas id="wheelCanvas" class="wheel-canvas" width="360" height="360"></canvas>
        <button class="wheel-spin-btn" id="wheelSpinBtn" onclick="spinWheel()">✨ Spin the Wheel</button>
      </div>
      <div class="wheel-result" id="wheelResult">
        <div class="wheel-result-label">Your next read is…</div>
        <div class="wheel-result-cover" id="wheelResultCover"></div>
        <div class="wheel-result-title" id="wheelResultTitle"></div>
        <div class="wheel-result-author" id="wheelResultAuthor"></div>
        <div class="wheel-result-actions">
          <button class="btn-primary" style="width:auto;padding:10px 22px" id="wheelStartBtn" onclick="wheelStartReading()">📖 Start Reading</button>
          <button class="btn-secondary" style="width:auto;padding:10px 22px;margin-top:0" onclick="spinWheel()">🔄 Spin Again</button>
        </div>
      </div>
    </div>`;
}

let _wheelBooks=[], _wheelAngle=0, _wheelSpinning=false, _wheelResult=null;
const WHEEL_COLORS=['#c8703a','#e09050','#c8a870','#8a9a6a','#5a8fd0','#9a7ab0','#d4904a','#7aaa8a','#b07060','#6a8ab0'];

function initWheel() {
  const tbr = state.books.filter(b=>b.status==='tbr');
  if (!tbr.length) return;
  _wheelBooks = tbr;
  _wheelAngle = 0;
  drawWheel(0);
}

function drawWheel(angle) {
  const canvas = document.getElementById('wheelCanvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const size = 360;
  // Only resize if needed
  if (canvas.width !== size * dpr) {
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
  }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const n = _wheelBooks.length;
  const slice = (Math.PI*2)/n;
  const cx=180, cy=180, r=168, inner=44;
  ctx.clearRect(0,0,size,size);

  // Shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.18)'; ctx.shadowBlur=18;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore();

  _wheelBooks.forEach((b,i) => {
    const start = angle + i*slice - Math.PI/2;
    const end = start + slice;
    const color = WHEEL_COLORS[i % WHEEL_COLORS.length];

    // Segment
    ctx.beginPath();
    ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath();
    ctx.fillStyle = color; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start + slice/2);
    ctx.textAlign='right';
    const label = b.title.length>16 ? b.title.slice(0,15)+'…' : b.title;
    const textR = r - 12;
    ctx.fillStyle='rgba(255,255,255,0.95)';
    const fontSize = Math.max(8, Math.min(11, 160/n));
    ctx.font = `bold ${fontSize}px Lato,sans-serif`;
    ctx.fillText(label, textR, 4);
    ctx.restore();
  });

  // Centre hub
  ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2);
  ctx.fillStyle='#f5ede0'; ctx.fill();
  ctx.strokeStyle='rgba(200,112,58,0.3)'; ctx.lineWidth=2; ctx.stroke();

  // Centre icon
  ctx.font='22px serif'; ctx.textAlign='center';
  ctx.fillText('📚', cx, cy+8);
}

function spinWheel() {
  if (_wheelSpinning) return;
  const tbr = state.books.filter(b=>b.status==='tbr');
  if (!tbr.length) return;
  _wheelBooks = tbr;
  _wheelSpinning = true;

  const btn = document.getElementById('wheelSpinBtn');
  const result = document.getElementById('wheelResult');
  if (btn) btn.disabled = true;
  if (result) result.classList.remove('show');

  // Pick random winner
  const winner = Math.floor(Math.random() * _wheelBooks.length);
  const n = _wheelBooks.length;
  const slice = (Math.PI*2) / n;

  // Pointer is at top (12 o'clock = -PI/2 in canvas coords).
  // Segment i starts at: angle + i*slice - PI/2
  // We want winner segment's midpoint to sit at the pointer (angle = -PI/2)
  // So we need: finalAngle + winner*slice - PI/2 + slice/2 = -PI/2 (mod 2PI)
  // => finalAngle = -(winner * slice) - slice/2
  const fullSpins = 5 + Math.floor(Math.random()*3); // 5-7 full rotations
  const landingAngle = -(winner * slice) - slice/2;
  const targetAngle = Math.PI*2*fullSpins + landingAngle;

  const duration = 3500 + Math.random()*1000;
  const startTime = performance.now();
  const startAngle = _wheelAngle;

  function ease(t) { return 1 - Math.pow(1-t, 4); }

  function animate(now) {
    const t = Math.min((now-startTime)/duration, 1);
    _wheelAngle = startAngle + ease(t) * (targetAngle - startAngle);
    drawWheel(_wheelAngle);
    if (t < 1) { requestAnimationFrame(animate); }
    else {
      _wheelAngle = targetAngle;
      drawWheel(_wheelAngle);
      _wheelSpinning = false;
      _wheelResult = _wheelBooks[winner];
      showWheelResult(_wheelResult);
      if (btn) btn.disabled = false;
    }
  }
  requestAnimationFrame(animate);
}

function showWheelResult(book) {
  const result = document.getElementById('wheelResult');
  const cover = document.getElementById('wheelResultCover');
  const title = document.getElementById('wheelResultTitle');
  const author = document.getElementById('wheelResultAuthor');
  const startBtn = document.getElementById('wheelStartBtn');
  if (!result) return;
  if (cover) cover.innerHTML = coverHTML(book,72,106,10);
  if (title) title.textContent = book.title;
  if (author) author.textContent = book.author || 'Unknown author';
  if (startBtn) startBtn.setAttribute('data-id', book.id);
  result.classList.add('show');
}

function wheelStartReading() {
  if (!_wheelResult) return;
  _wheelResult.status = 'reading';
  save(); renderContent();
  showToast(`📖 Started reading "${_wheelResult.title}"!`);
}

function wtrTab(tab, el) {
  document.querySelectorAll('.wtr-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.wtr-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('wtr-'+tab)?.classList.add('active');
}

function wtrShowManual() {
  document.querySelectorAll('.wtr-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.wtr-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('wtr-quick')?.classList.add('active');
}

function wtrQuickAdd() {
  const title = document.getElementById('wtr-quick-title')?.value.trim();
  const author = document.getElementById('wtr-quick-author')?.value.trim();
  if (!title) { showToast('⚠️ Enter a book title'); return; }
  addWtrBook({ title, author: author || '' });
  closeModal();
  showToast('📋 Added to Want to Read!');
}

function addWtrBook(data) {
  state.books.unshift({
    id: state.nextId++,
    title:  data.title  || 'Unknown Title',
    author: data.author || '',
    pages:  data.pages  || 0,
    currentPage: 0,
    status: 'tbr',
    coverImg: data.coverImg || null,
    coverEmoji: '📖',
    tags: [], rating: 0, spice: 0,
    note: data.note || '',
    dateAdded: new Date().toISOString(),
    dateRead: null, series: data.series || ''
  });
  save(); renderContent();
}

// Store extracted books temporarily for adding
let _wtrExtracted = { amazon:[], ig:[], barcode:[], libib:[] };

function wtrBookCardHTML(b, i, source) {
  const cover = b.coverImg
    ? `<img src="${b.coverImg}" style="width:38px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0" onerror="this.style.display='none'">`
    : `<div style="width:38px;height:56px;border-radius:6px;background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📖</div>`;
  return `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:10px;border:1px solid var(--border2);cursor:pointer;transition:background 0.12s" onclick="wtrAddFromCard(${i},'${source}')" onmouseover="this.style.background='var(--rose-light)'" onmouseout="this.style.background='var(--bg3)'">
    ${cover}
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:800;color:var(--ink);line-height:1.2;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(b.title)}</div>
      <div style="font-size:11px;color:var(--ink2);font-weight:600">${esc(b.author||'Unknown author')}</div>
      ${b.series?`<div style="font-size:10px;color:var(--rose);font-weight:700;margin-top:2px">🔖 ${esc(b.series)}</div>`:''}
      ${b.pages?`<div style="font-size:10px;color:var(--ink3);margin-top:2px">${b.pages} pages</div>`:''}
    </div>
    <div style="font-size:18px;color:var(--rose);flex-shrink:0">＋</div>
  </div>`;
}

async function wtrExtractFromText(text, source) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 800,
      messages: [{ role: 'user', content: `Extract all book recommendations from this text. Return ONLY a JSON array, no markdown: [{"title":"...","author":"...","pages":0}]. Text: ${text}` }]
    })
  });
  const data = await resp.json();
  const raw = data.content?.[0]?.text || '[]';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

async function wtrInstagram() {
  const text = document.getElementById('wtr-ig-text')?.value.trim();
  if (!text) { showToast('⚠️ Paste some post text first'); return; }
  const btn = document.getElementById('wtr-ig-btn');
  const results = document.getElementById('wtr-ig-results');
  btn.disabled = true; btn.textContent = '⏳ Extracting…';
  results.innerHTML = '';
  try {
    const books = await wtrExtractFromText(text, 'instagram');
    _wtrExtracted.ig = books || [];
    if (books && books.length) {
      results.innerHTML = `<div class="wtr-status">✓ Found ${books.length} book${books.length>1?'s':''} — tap to add:</div>` +
        books.map((b,i) => wtrBookCardHTML(b,i,'ig')).join('');
    } else {
      results.innerHTML = '<div class="wtr-status">⚠️ No books found — try pasting more of the caption.</div>';
    }
  } catch(e) {
    results.innerHTML = '<div class="wtr-status">⚠️ Extraction failed — try again.</div>';
  }
  btn.disabled = false; btn.textContent = '✨ Extract Books';
}

async function wtrAmazon() {
  const raw = document.getElementById('wtr-amazon-url')?.value.trim();
  if (!raw) { showToast('⚠️ Paste a URL or book title first'); return; }
  const btn = document.getElementById('wtr-amazon-btn');
  const results = document.getElementById('wtr-amazon-results');
  btn.disabled = true; btn.textContent = '⏳ Searching…';
  results.innerHTML = '';

  try {
    let searchQuery = raw;
    if (raw.startsWith('http')) {
      const slugMatch = raw.match(/amazon\.[^/]+\/(.+?)\/dp\//);
      if (slugMatch) searchQuery = slugMatch[1].replace(/-/g,' ').trim();
      else {
        const pathMatch = raw.match(/amazon\.[^/]+\/([^?#]+)/);
        if (pathMatch) searchQuery = pathMatch[1].replace(/[-/]/g,' ').trim();
      }
    }

    let books = null;

    // Try Google Books first — best CORS support
    try {
      const resp = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(searchQuery)}&maxResults=5&printType=books`);
      const data = await resp.json();
      if (data.items && data.items.length) {
        books = data.items.map(item => {
          const v = item.volumeInfo;
          // Google Books sometimes puts series in subtitle e.g. "A Stormlight Archive Novel"
          const seriesHint = v.subtitle || '';
          return {
            title:    v.title || '',
            author:   v.authors?.[0] || '',
            pages:    v.pageCount || 0,
            coverImg: v.imageLinks?.thumbnail?.replace('http://','https://').replace('zoom=1','zoom=0').replace('&edge=curl','') || null,
            series:   '',
            _seriesHint: seriesHint,
          };
        });
      }
    } catch(e) { /* fall through to Open Library */ }

    // Fallback: Open Library
    if (!books) {
      const resp = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(searchQuery)}&limit=5&fields=title,author_name,number_of_pages_median,cover_i`);
      const data = await resp.json();
      if (data.docs && data.docs.length) {
        books = data.docs.map(d => ({
          title:    d.title,
          author:   d.author_name?.[0] || '',
          pages:    d.number_of_pages_median || 0,
          coverImg: d.cover_i ? `https://covers.openlibrary.org/b/id/${d.cover_i}-M.jpg` : null,
          series:   '',
        }));
      }
    }

    // Enrich with series info via AI (single call for all results)
    if (books && books.length) {
      try {
        const list = books.map((b,i) => `${i}: "${b.title}" by ${b.author}`).join(', ');
        const aiResp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 300,
            messages: [{ role: 'user', content: `For each book, return the series name if it belongs to one, or null if standalone. Respond ONLY with a JSON array of strings in the same order, e.g. ["The Stormlight Archive","Mistborn",null]. Books: ${list}` }]
          })
        });
        const aiData = await aiResp.json();
        const seriesArr = JSON.parse((aiData.content?.[0]?.text || '[]').replace(/```json|```/g,'').trim());
        books = books.map((b, i) => ({ ...b, series: seriesArr[i] || '' }));
      } catch(e) { /* series enrichment failed silently — no big deal */ }

    }

    if (books && books.length) {
      _wtrExtracted.amazon = books;
      results.innerHTML = '<div class="wtr-status">✓ Tap a result to add:</div>' +
        books.map((b,i) => wtrBookCardHTML(b,i,'amazon')).join('');
    } else {
      results.innerHTML = '<div class="wtr-status">⚠️ No results found — try a shorter title.</div>';
    }
  } catch(e) {
    results.innerHTML = `<div class="wtr-status">⚠️ Search failed: ${e.message}. Try Quick Add.</div>`;
  }
  btn.disabled = false; btn.textContent = '🔍 Search';
}

function wtrAddFromCard(i, source) {
  const book = _wtrExtracted[source]?.[i];
  if (!book) return;
  addWtrBook(book);
  closeModal();
  showToast(`📋 "${book.title}" added to Want to Read!`);
}

// ISBN / Barcode lookup — Google Books first, Open Library fallback
async function wtrLookupISBN(isbn) {
  if (!isbn) { showToast('⚠️ Enter an ISBN'); return; }
  isbn = isbn.replace(/[^0-9X]/gi,'');
  const results = document.getElementById('wtr-barcode-results');
  if (results) results.innerHTML = '<div class="wtr-status">⏳ Looking up…</div>';
  try {
    let b = null;

    // Try Google Books
    try {
      const resp = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
      const d = await resp.json();
      if (d.items?.[0]) {
        const v = d.items[0].volumeInfo;
        b = { title: v.title, author: v.authors?.[0]||'', pages: v.pageCount||0, coverImg: v.imageLinks?.thumbnail?.replace('http://','https://')||null };
      }
    } catch(e) {}

    // Fallback: Open Library
    if (!b) {
      const resp = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
      const d = await resp.json();
      const book = d[`ISBN:${isbn}`];
      if (book) b = { title: book.title, author: book.authors?.[0]?.name||'', pages: book.number_of_pages||0, coverImg: book.cover?.medium||null };
    }

    if (b) {
      _wtrExtracted.barcode = [b];
      if (results) results.innerHTML = wtrBookCardHTML(b, 0, 'barcode');
    } else {
      if (results) results.innerHTML = '<div class="wtr-status">⚠️ Book not found — try adding manually.</div>';
    }
  } catch(e) {
    if (results) results.innerHTML = `<div class="wtr-status">⚠️ Lookup failed: ${e.message}</div>`;
  }
}

let _wtrStream = null;
let _wtrScanInterval = null;

async function wtrStartScan() {
  document.getElementById('wtr-barcode-video-wrap').style.display = 'block';
  const status = document.getElementById('wtr-scan-status');
  try {
    _wtrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' } });
    const video = document.getElementById('wtr-video');
    video.srcObject = _wtrStream;
    await video.play();
    // Load barcode scanner library
    if (!window.ZXing) {
      await new Promise((res,rej) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/@zxing/library@latest/umd/index.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const codeReader = new ZXing.BrowserBarcodeReader();
    status.textContent = 'Point at ISBN barcode…';
    _wtrScanInterval = setInterval(async () => {
      const canvas = document.getElementById('wtr-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      try {
        const result = await codeReader.decodeFromImage(undefined, canvas.toDataURL());
        if (result) {
          status.textContent = `✓ Found: ${result.text}`;
          clearInterval(_wtrScanInterval);
          wtrStopScan();
          await wtrLookupISBN(result.text);
        }
      } catch(e) {}
    }, 800);
  } catch(e) {
    status.textContent = '⚠️ Camera access denied — use ISBN lookup below.';
  }
}

function wtrStopScan() {
  if (_wtrScanInterval) { clearInterval(_wtrScanInterval); _wtrScanInterval = null; }
  if (_wtrStream) { _wtrStream.getTracks().forEach(t=>t.stop()); _wtrStream = null; }
  document.getElementById('wtr-barcode-video-wrap').style.display = 'none';
}

function wtrLibib(e) {
  const file = e.target.files[0]; if (!file) return;
  const results = document.getElementById('wtr-libib-results');
  results.innerHTML = '<div class="wtr-status">⏳ Reading CSV…</div>';
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const lines = evt.target.result.split('\n');
      const headers = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
      const titleIdx  = headers.findIndex(h=>h.includes('title'));
      const authorIdx = headers.findIndex(h=>h.includes('author') || h.includes('creator'));
      const pagesIdx  = headers.findIndex(h=>h.includes('page'));

      const books = [];
      for (let i=1; i<lines.length; i++) {
        const cols = lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
        const title = titleIdx>=0 ? cols[titleIdx] : '';
        if (!title) continue;
        books.push({
          title,
          author: authorIdx>=0 ? cols[authorIdx] : '',
          pages:  pagesIdx>=0  ? parseInt(cols[pagesIdx])||0 : 0,
        });
      }

      if (!books.length) {
        results.innerHTML = '<div class="wtr-status">⚠️ No books found in CSV.</div>';
        return;
      }

      // Check duplicates
      const existing = new Set(state.books.map(b=>b.title.toLowerCase().trim()));
      const newBooks = books.filter(b=>!existing.has(b.title.toLowerCase().trim()));
      const dupCount = books.length - newBooks.length;

      _wtrExtracted.libib = newBooks;
      const dupNote = dupCount > 0 ? ` <span style="color:var(--ink3)">(${dupCount} duplicate${dupCount>1?'s':''} skipped)</span>` : '';
      results.innerHTML = `<div class="wtr-status">✓ Found ${newBooks.length} new book${newBooks.length!==1?'s':''}${dupNote}:</div>
        <button class="wtr-btn" style="margin-bottom:8px" onclick="wtrAddAllLibib()">＋ Add All ${newBooks.length} Books</button>` +
        newBooks.slice(0,10).map((b,i) => wtrBookCardHTML(b,i,'libib')).join('') +
        (newBooks.length>10 ? `<div class="wtr-status">…and ${newBooks.length-10} more (use Add All)</div>` : '');
    } catch(err) {
      results.innerHTML = '<div class="wtr-status">⚠️ Could not read CSV — check the file format.</div>';
    }
  };
  reader.readAsText(file);
}

function wtrAddAllLibib() {
  const books = _wtrExtracted.libib || [];
  // Double-check duplicates at add time in case library changed
  const existing = new Set(state.books.map(b=>b.title.toLowerCase().trim()));
  const toAdd = books.filter(b=>!existing.has(b.title.toLowerCase().trim()));
  const skipped = books.length - toAdd.length;
  toAdd.forEach(b => addWtrBook(b));
  closeModal();
  const msg = skipped > 0
    ? `📚 Added ${toAdd.length} books, skipped ${skipped} duplicate${skipped>1?'s':''}`
    : `📚 Added ${toAdd.length} books from Libib!`;
  showToast(msg);
  showTab('tbr');
}

// DISCOVER — recommendations by tag, by read, new releases
// ════════════════════════════════════════════
let discoverCache   = {};   // { sectionKey: [books] }
let discoverLoading = false;
let discoverGen     = 0;
let discActiveBook  = null; // { sectionKey, bookId }

async function renderDiscover() {
  const c = document.getElementById('mainContent');
  const readBooks = state.books.filter(b => b.status === 'read');

  // Build basis description
  const tagCounts = {};
  state.books.forEach(b => (b.tags||[]).forEach(t => { tagCounts[t] = (tagCounts[t]||0)+1; }));
  const topTags = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>e[0]);

  let basisHtml = readBooks.length
    ? `Based on <b>${readBooks.length} read book${readBooks.length>1?'s':''}</b>`
      + (topTags.length ? ` · top genres: <b>${topTags.slice(0,3).join(', ')}</b>` : '')
    : 'Add books to your <b>Read</b> shelf to unlock personalised picks.';

  c.innerHTML = `
    <div class="discover-wrap" id="discoverWrap">
      <div class="discover-header">
        <div class="discover-basis">${basisHtml}</div>
        <button class="discover-refresh" onclick="refreshDiscover()" id="discoverRefreshBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          Refresh
        </button>
      </div>
      <div id="discoverSections"></div>
    </div>`;

  if (!readBooks.length) {
    document.getElementById('discoverSections').innerHTML =
      `<div class="discover-empty">📚 Finish some books and mark them as Read — then come back for recommendations!</div>`;
    return;
  }

  // Always fetch fresh — cache was causing silent failures
  discoverCache = {};
  fetchAllSections(readBooks, topTags, null);
}

async function refreshDiscover() {
  discoverCache = {};
  discActiveBook = null;
  discoverGen++;
  const btn = document.getElementById('discoverRefreshBtn');
  if (btn) { btn.classList.add('spinning'); setTimeout(()=>btn?.classList.remove('spinning'), 700); }
  const readBooks = state.books.filter(b => b.status === 'read');
  const tagCounts = {};
  state.books.forEach(b => (b.tags||[]).forEach(t => { tagCounts[t] = (tagCounts[t]||0)+1; }));
  const topTags = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>e[0]);
  fetchAllSections(readBooks, topTags);
}

// Fetch books via plain fetch() — works on https:// (GitHub Pages)
async function fetchBooksJSONP(query) {
  try {
    const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=20&printType=books&orderBy=relevance&langRestrict=en`;
    const resp = await fetch(url);
    if (!resp.ok) return [];
    const data = await resp.json();
    return data.items || [];
  } catch(e) {
    return [];
  }
}

// Build all section definitions then fetch each
async function fetchAllSections(readBooks, topTags, debugEl) {
  console.log('fetchAllSections called, readBooks:', readBooks.length, 'topTags:', topTags);
  const gen = ++discoverGen;
  discoverLoading = true;

  const existingTitles = new Set(state.books.map(b => b.title.toLowerCase().trim()));
  const safeKey = str => str.replace(/[^a-z0-9]/gi, '_').slice(0, 40);
  const sections = [];

  const highRated = readBooks.filter(b => b.rating >= 4);
  const favAuthors = [...new Set((highRated.length ? highRated : readBooks).map(b => b.author))].slice(0, 2);

  // Derive genres: from tags first, fall back to popular fiction genres
  const tagCounts = {};
  state.books.forEach(b => (b.tags||[]).forEach(t => { tagCounts[t] = (tagCounts[t]||0)+1; }));
  let genres = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>e[0]);
  if (!genres.length) {
    // No tags — infer from authors or use popular defaults
    const allAuthors = [...new Set(readBooks.map(b=>b.author))];
    genres = ['Fiction','Romance','Fantasy','Mystery','Thriller'];
  }

  // 1. Author shelves
  favAuthors.forEach(author => {
    sections.push({
      key: `author_${safeKey(author)}`,
      label: `More from ${author}`,
      sub: 'Author picks',
      queries: [`inauthor:"${author}"`, `inauthor:${author.split(' ').pop()}`, author]
    });
  });

  // 2. Genre shelves
  genres.slice(0,5).forEach(tag => {
    sections.push({
      key: `tag_${safeKey(tag)}`,
      label: tag,
      sub: 'By genre',
      queries: [`subject:${tag}`, `${tag} fiction`, `${tag} novel`]
    });
  });

  // 3. New releases in top 2 genres
  const yr = new Date().getFullYear();
  genres.slice(0,2).forEach(tag => {
    sections.push({
      key: `new_${safeKey(tag)}`,
      label: `New in ${tag}`,
      sub: 'New releases',
      queries: [`${tag} ${yr}`, `${tag} ${yr-1}`, `subject:${tag}`]
    });
  });

  // 4. Because you read… (pick random high-rated book)
  if (readBooks.length) {
    const pool = highRated.length ? highRated : readBooks;
    const pick = pool[Math.floor(Math.random() * pool.length)];
    const genre = (pick.tags||[])[0] || genres[0] || 'fiction';
    sections.push({
      key: `because_${pick.id}`,
      label: `Because you read "${pick.title}"`,
      sub: 'Similar reads',
      queries: [`inauthor:"${pick.author}"`, `subject:${genre}`, `${genre} novel`]
    });
  }

  // 5. Fallback: always ensure we have at least 3 sections
  if (sections.length < 3) {
    ['Romance','Fantasy','Thriller'].forEach((g,i) => {
      sections.push({ key: `fallback_${i}`, label: g, sub: 'Popular', queries: [`subject:${g}`, `${g} novel`] });
    });
  }

  // Show skeleton sections
  const sectionsEl = document.getElementById('discoverSections');
  if (!sectionsEl) return;
  sectionsEl.innerHTML = sections.map(s => `
    <div class="disc-section" id="dsec_${s.key}">
      <div class="disc-section-head">
        <div>
          <span class="disc-section-title">${s.label}</span>
          <span class="disc-section-sub">${s.sub}</span>
        </div>
      </div>
      <div class="disc-grid" id="dgrid_${s.key}">
        ${Array(8).fill(`<div class="disc-book disc-book-skeleton"><div class="disc-book-img-wrap"></div><div class="disc-book-title-label"></div></div>`).join('')}
      </div>
      <div class="disc-shelf-board"></div>
    </div>`).join('');

  async function fetchWithFallback(queries) {
    for (const q of queries) {
      try {
        console.log('Trying query:', q);
        const items = await fetchBooksJSONP(q);
        console.log('Got', items.length, 'items for:', q);
        if (items.length >= 3) return items;
      } catch(e) { console.error('Query failed:', q, e); continue; }
    }
    return [];
  }

  if (debugEl) debugEl.remove();

  await Promise.all(sections.map(async sec => {
    if (gen !== discoverGen) return;
    try {
      const items = await fetchWithFallback(sec.queries);
      if (gen !== discoverGen) return;

      const books = [];
      const seenInSection = new Set();
      items.forEach(item => {
        const info = item.volumeInfo || {};
        const title = (info.title || '').trim();
        if (!title) return;
        if (existingTitles.has(title.toLowerCase())) return;
        if (seenInSection.has(title.toLowerCase())) return;
        // Skip books with no useful info
        if (!info.authors || !info.authors.length) return;
        seenInSection.add(title.toLowerCase());
        books.push({
          id: item.id,
          title,
          author: info.authors.join(', '),
          cover: info.imageLinks?.thumbnail?.replace('http://', 'https://') || null,
          desc: info.description || '',
          pages: info.pageCount || null,
          categories: (info.categories || []).slice(0, 2).join(', '),
          year: (info.publishedDate || '').slice(0, 4),
          key: sec.key,
        });
      });

      discoverCache[sec.key] = books;

      const grid = document.getElementById(`dgrid_${sec.key}`);
      if (grid && gen === discoverGen) {
        if (!books.length) {
          // Hide the whole section rather than show an error
          const section = document.getElementById(`dsec_${sec.key}`);
          if (section) section.style.display = 'none';
        } else {
          grid.innerHTML = books.map(b => discBookHtml(b, sec.key)).join('');
        }
      }
    } catch(e) {
      const section = document.getElementById(`dsec_${sec.key}`);
      if (section) section.style.display = 'none';
    }
  }));

  discoverLoading = false;
}

function renderDiscoverSections() {
  const sectionsEl = document.getElementById('discoverSections');
  if (!sectionsEl) return;
  sectionsEl.innerHTML = Object.entries(discoverCache).map(([key, books]) => {
    const label = discoverSectionLabel(key);
    return `
      <div class="disc-section" id="dsec_${key}">
        <div class="disc-section-head">
          <div><span class="disc-section-title">${label.title}</span>
          <span class="disc-section-sub">${label.sub}</span></div>
        </div>
        <div class="disc-grid" id="dgrid_${key}">
          ${books.map(b => discBookHtml(b, key)).join('')}
        </div>
        <div class="disc-shelf-board"></div>
      </div>`;
  }).join('');
}

function discoverSectionLabel(key) {
  if (key.startsWith('author_')) return { title: `More from ${key.slice(7)}`, sub: 'Author picks' };
  if (key.startsWith('tag_'))    return { title: key.slice(4), sub: 'By genre' };
  if (key.startsWith('new_'))    return { title: `New in ${key.slice(4)}`, sub: 'New releases' };
  if (key.startsWith('because_'))return { title: 'Similar reads', sub: 'Because you read it' };
  return { title: key, sub: '' };
}

function discBookHtml(b, sectionKey) {
  const colors = ['#8b5e3c','#4a6741','#3d5a80','#6b4c7a','#7a4040','#3d6b5a','#5a5a3d'];
  const col = colors[(b.title||'').charCodeAt(0) % colors.length];
  const shortTitle = b.title.length > 22 ? b.title.slice(0,20)+'…' : b.title;
  const safeTitle = b.title.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const safeAuthor = b.author.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const safeDesc = b.desc.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');

  const coverInner = b.cover
    ? `<img class="disc-book-cover" src="${b.cover}" alt="${b.title.replace(/"/g,'')}"
         onerror="this.parentElement.innerHTML='<div class=\\'disc-book-placeholder\\' style=\\'background:${col}\\'>📖<div>${shortTitle}</div></div>'">`
    : `<div class="disc-book-placeholder" style="background:${col}">📖<div>${shortTitle}</div></div>`;

  return `<div class="disc-book" onclick="discToggleDetail(this,'${safeTitle}','${safeAuthor}','${b.cover||''}','${safeDesc}',${b.pages||0},'${b.categories||''}','${b.year||''}','${sectionKey}')">
    <div class="disc-book-img-wrap">${coverInner}</div>
    <div class="disc-book-title-label">${b.title}</div>
  </div>`;
}

// Click a book → insert/remove detail panel after its row
function discToggleDetail(el, title, author, cover, desc, pages, categories, year, sectionKey) {
  const grid = el.closest('.disc-grid');
  if (!grid) return;

  // If same book clicked again — close
  const existing = grid.querySelector('.disc-detail-panel');
  const isSame = existing && existing.dataset.bookTitle === title;
  if (existing) existing.remove();
  if (isSame) { discActiveBook = null; return; }

  discActiveBook = { sectionKey, title };

  const alreadyIn = state.books.some(s => s.title.toLowerCase() === title.toLowerCase());

  // Figure out which grid row this book is in, insert panel after last book in that row
  const books = [...grid.querySelectorAll('.disc-book:not(.disc-book-skeleton)')];
  const idx = books.indexOf(el);

  // Compute books per row from grid layout
  const gridWidth = grid.offsetWidth;
  const bookWidth = el.offsetWidth + 12; // gap
  const booksPerRow = Math.max(1, Math.round(gridWidth / bookWidth));
  const rowEnd = Math.min(Math.ceil((idx+1) / booksPerRow) * booksPerRow, books.length) - 1;

  const panel = document.createElement('div');
  panel.className = 'disc-detail-panel';
  panel.dataset.bookTitle = title;

  const coverEl = cover
    ? `<img class="disc-panel-cover" src="${cover}" onerror="this.style.display='none'">`
    : `<div class="disc-panel-cover-ph" style="background:${['#8b5e3c','#4a6741','#3d5a80'][title.charCodeAt(0)%3]}">📖</div>`;

  const addEl = alreadyIn
    ? `<div class="disc-panel-already">✓ Already in your library</div>`
    : `<button class="disc-panel-add" onclick="discAddFromPanel(this,'${title.replace(/'/g,"\\'")}','${author.replace(/'/g,"\\'")}',${pages},'${categories.replace(/'/g,"\\'")}')">＋ Add to Want to Read</button>`;

  panel.innerHTML = `
    <button class="disc-panel-close" onclick="this.closest('.disc-detail-panel').remove()">✕</button>
    ${coverEl}
    <div class="disc-panel-body">
      <div class="disc-panel-title">${title}</div>
      <div class="disc-panel-author">${author}</div>
      ${desc ? `<div class="disc-panel-desc">${desc}</div>` : ''}
      <div class="disc-panel-meta">
        ${pages ? `<span>📄 ${pages} pages</span>` : ''}
        ${year ? `<span>📅 ${year}</span>` : ''}
        ${categories ? `<span>🏷 ${categories}</span>` : ''}
      </div>
      ${addEl}
    </div>`;

  // Insert after the last book in the same row
  const afterEl = books[rowEnd];
  afterEl.after(panel);
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function discAddFromPanel(btn, title, author, pages, categories) {
  const matchTag = state.tags.find(t => categories.toLowerCase().includes(t.name.toLowerCase()));
  state.books.unshift({
    id: state.nextId++, title, author,
    status: 'tbr', coverEmoji: '📖', coverImg: null,
    tags: matchTag ? [matchTag.name] : [],
    rating: 0, spice: 0, progress: 0,
    pages: pages||0, currentPage: 0,
    note: '', series: null, seriesOrder: null, dateRead: null
  });
  save();
  btn.textContent = '✓ Added to Want to Read!';
  btn.classList.add('added');
  btn.disabled = true;
  updateSidebar();
  showToast('📋 Added to Want to Read!');
}

// Keep discAddToTbr as alias for backward compat
function discAddToTbr(btn, title, author, pages, category) {
  discAddFromPanel(btn, title, author, pages, category);
}

// GOODREADS CSV IMPORT
// ════════════════════════════════════════════
function triggerGoodreadsImport() {
  document.getElementById('goodreadsFileInput').value = '';
  document.getElementById('goodreadsFileInput').click();
}

function handleGoodreadsCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => parseGoodreadsCSV(e.target.result);
  reader.readAsText(file);
}

function parseGoodreadsCSV(text) {
  // Robust CSV parser — handles quoted fields, escaped quotes, and Goodreads ="value" ISBN fields
  function parseCSVLine(line) {
    const result = [];
    let cur = '', inQuote = false, i = 0;
    while (i < line.length) {
      const ch = line[i];
      if (ch === '"' && !inQuote) {
        inQuote = true; i++;
      } else if (ch === '"' && inQuote) {
        if (line[i+1] === '"') { cur += '"'; i += 2; } // escaped quote ""
        else { inQuote = false; i++; }
      } else if (ch === ',' && !inQuote) {
        // Strip Goodreads ="value" wrapper from ISBN fields
        let val = cur.trim();
        if (val.startsWith('=') && val[1] === '"') val = val.slice(2, -1);
        result.push(val);
        cur = ''; i++;
      } else {
        cur += ch; i++;
      }
    }
    let val = cur.trim();
    if (val.startsWith('=') && val[1] === '"') val = val.slice(2, -1);
    result.push(val);
    return result;
  }

  // Split into lines respecting quoted newlines
  const lines = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') inQuote = !inQuote;
    if (ch === '\n' && !inQuote) { lines.push(cur.replace(/\r$/, '')); cur = ''; }
    else cur += ch;
  }
  if (cur.trim()) lines.push(cur);

  if (lines.length < 2) { showToast('⚠️ Could not read CSV — check the file'); return; }

  const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().replace(/\s+/g,'_'));

  // Goodreads column names we care about
  const col = name => headers.indexOf(name);
  const iTitle       = col('title');
  const iAuthor      = col('author_l-f') !== -1 ? col('author_l-f') : col('author');
  const iRating      = col('my_rating');
  const iPages       = col('number_of_pages');
  const iDateRead    = col('date_read');
  const iDateAdded   = col('date_added');
  const iShelf       = col('exclusive_shelf');
  const iShelves     = col('bookshelves');
  const iSeries      = col('series') !== -1 ? col('series') : -1;

  if (iTitle === -1) { showToast('⚠️ Not a valid Goodreads export'); return; }

  const existingTitles = new Set(state.books.map(b => b.title.toLowerCase().trim()));

  let imported = 0, skipped = 0;
  const newBooks = [];

  for (let i = 1; i < lines.length; i++) {
    const row = parseCSVLine(lines[i]);
    if (row.length < 3) continue;

    const rawTitle  = (row[iTitle] || '').trim();
    if (!rawTitle) continue;

    // Skip duplicates
    if (existingTitles.has(rawTitle.toLowerCase())) { skipped++; continue; }

    // Map Goodreads shelf → Read. status
    const grShelf = iShelf !== -1 ? (row[iShelf]||'').toLowerCase().trim() : '';
    let status = 'tbr';
    if (grShelf === 'read') status = 'read';
    else if (grShelf === 'currently-reading') status = 'reading';
    else if (grShelf === 'to-read') status = 'tbr';

    // Author — Goodreads exports as "Last, First" — flip it
    let author = iAuthor !== -1 ? (row[iAuthor]||'').trim() : '';
    if (author.includes(',')) {
      const [last, first] = author.split(',').map(s=>s.trim());
      author = first ? `${first} ${last}` : last;
    }

    // Rating (0–5)
    const rating = iRating !== -1 ? parseInt(row[iRating]||'0')||0 : 0;

    // Pages
    const pages = iPages !== -1 ? parseInt(row[iPages]||'0')||0 : 0;

    // Date read — Goodreads formats: "2023/11/04" or "2023-11-04" or blank
    let dateRead = null;
    if (status === 'read' && iDateRead !== -1 && row[iDateRead]) {
      const raw = row[iDateRead].trim();
      if (raw && raw !== 'undefined' && raw.length >= 4) {
        // Convert YYYY/MM/DD → YYYY-MM-DD, leave YYYY-MM-DD as-is
        const converted = raw.replace(/\//g, '-');
        // Validate it looks like a real date
        if (/^\d{4}-\d{2}-\d{2}$/.test(converted)) {
          dateRead = converted;
        } else if (/^\d{4}$/.test(converted)) {
          // Just a year — use Jan 1 of that year
          dateRead = converted + '-01-01';
        }
        // Otherwise leave as null
      }
    }

    // Series
    let series = null;
    if (iSeries !== -1 && row[iSeries]) {
      series = row[iSeries].trim() || null;
    }
    // Also try to extract from title (Goodreads often puts "(Series #1)" in title)
    const seriesMatch = rawTitle.match(/\(([^)]+),?\s*#[\d.]+\)/);
    let cleanTitle = rawTitle;
    if (seriesMatch) {
      series = series || seriesMatch[1].replace(/,\s*#[\d.]+/, '').trim();
      cleanTitle = rawTitle.replace(seriesMatch[0], '').trim();
    }

    existingTitles.add(cleanTitle.toLowerCase());
    imported++;

    newBooks.push({
      id: state.nextId++,
      title: cleanTitle,
      author,
      status,
      coverEmoji: '📖',
      coverImg: null,
      tags: [],
      rating,
      spice: 0,
      progress: status === 'read' ? 100 : 0,
      pages,
      currentPage: status === 'read' ? pages : 0,
      note: '',
      series,
      seriesOrder: null,
      dateRead: status === 'read' ? (dateRead || null) : null,
    });
  }

  if (!newBooks.length && skipped === 0) {
    showToast('⚠️ No books found in file');
    return;
  }

  // Add to state (new books go after existing)
  state.books = [...state.books, ...newBooks];
  save();
  renderContent();
  updateSidebar();

  // Show result modal
  openModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">📚 Goodreads Import Complete</div>
    <div style="text-align:center;padding:20px 0">
      <div style="font-family:'Playfair Display',serif;font-size:48px;color:var(--rose);line-height:1">${imported}</div>
      <div style="font-size:13px;font-weight:700;color:var(--ink2);margin-top:4px">books imported</div>
      ${skipped ? `<div style="font-size:12px;color:var(--ink3);margin-top:12px">${skipped} already in your library — skipped</div>` : ''}
      <div style="margin-top:20px;font-size:12px;color:var(--ink3);line-height:1.7">
        Covers aren't included in the Goodreads export.<br>
        Open any book and use <b>Search Covers</b> to add them.
      </div>
    </div>
    <button class="btn-primary" onclick="closeModal();showTab('read')" style="width:100%;padding:12px;border-radius:10px;background:var(--rose);border:none;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;margin-top:8px">
      View my Read shelf →
    </button>
  `);
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
initAuth();
</script>

<!-- PIN LOCK -->
<div id="pinLock" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:28px">
  <div style="font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--ink)">Read.</div>
  <div style="font-size:13px;color:var(--ink3);font-style:italic">Enter your PIN to continue</div>
  <div style="display:flex;gap:14px;">
    <div class="pin-dot" ></div>
    <div class="pin-dot" ></div>
    <div class="pin-dot" ></div>
    <div class="pin-dot" ></div>
  </div>
  <div id="pinError" style="color:#e05050;font-size:12px;min-height:16px;text-align:center"></div>
  <div class="pin-numpad">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <div></div>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key" onclick="pinBackspace()">⌫</button>
  </div>
</div>
</body>
</html>
