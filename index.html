<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read.</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #f5ede0;
  --bg2:        rgba(255,255,255,0.75);
  --bg3:        rgba(255,255,255,0.5);
  --sidebar:    #2a1a0e;
  --border:     rgba(200,140,60,0.18);
  --border2:    rgba(200,140,60,0.1);
  --ink:        #2a1a0e;
  --ink2:       #c8a880;
  --ink3:       #a07850;
  --rose:       #c8703a;
  --rose2:      #e09050;
  --rose-light: #fdeedd;
  --rose-fill:  #f5e0c8;
  --sage:       #7a9a6a;
  --line-color: rgba(200,140,60,0.07);
  --sidebar-ink:  #f0dcc0;
  --sidebar-ink2: #c8a880;
  --sidebar-ink3: #8a6840;
  --card:       #fff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 13px;
  background-image: repeating-linear-gradient(
    transparent, transparent 27px, var(--line-color) 28px
  );
  background-size: 100% 28px;
}

/* ══════════════════════════════════════
   DISCOVER — grid bookshelf layout
══════════════════════════════════════ */
.discover-wrap {
  padding: 0 28px 60px;
  height: 100%;
  overflow-y: auto;
}
.discover-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 0 18px;
  border-bottom: 1.5px solid var(--border);
  margin-bottom: 28px;
}
.discover-basis {
  font-size: 12px; color: var(--ink3); font-style: italic;
  line-height: 1.5; max-width: 480px;
}
.discover-basis b { color: var(--rose); font-style: normal; }
.discover-refresh {
  display: flex; align-items: center; gap: 8px;
  background: var(--rose); color: #fff;
  border: none; border-radius: 20px;
  padding: 8px 18px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: 'Nunito', sans-serif;
  transition: all 0.15s; flex-shrink: 0;
}
.discover-refresh:hover { background: var(--rose2); transform: translateY(-1px); }
.discover-refresh:active { transform: scale(0.97); }
.discover-refresh svg { transition: transform 0.6s ease; }
.discover-refresh.spinning svg { transform: rotate(360deg); }

/* Section */
.disc-section { margin-bottom: 40px; }
.disc-section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 14px;
}
.disc-section-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px; font-weight: 700; color: var(--ink);
}
.disc-section-sub {
  font-size: 10px; font-weight: 800; color: var(--ink3);
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-left: 10px;
}

/* Book grid — tight grid like the reference */
.disc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
  gap: 16px 12px;
}

/* Individual book tile */
.disc-book {
  display: flex; flex-direction: column;
  cursor: pointer;
  position: relative;
}
.disc-book-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 2/3;
  border-radius: 4px 6px 6px 4px;
  overflow: visible;
  box-shadow: 2px 3px 10px rgba(0,0,0,0.22), inset -2px 0 5px rgba(0,0,0,0.1);
  transition: transform 0.18s, box-shadow 0.18s;
  flex-shrink: 0;
}
.disc-book:hover .disc-book-img-wrap {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 4px 10px 22px rgba(0,0,0,0.28);
}
.disc-book-cover {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 4px 6px 6px 4px;
  display: block;
}
.disc-book-placeholder {
  width: 100%; height: 100%;
  border-radius: 4px 6px 6px 4px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px; gap: 6px;
  font-size: 9px; font-weight: 700; text-align: center; line-height: 1.3;
  color: rgba(255,255,255,0.88);
}
.disc-book-title-label {
  font-size: 10px; font-weight: 700; color: var(--ink2);
  margin-top: 7px; line-height: 1.3; text-align: center;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

/* Expanded detail panel — appears below the book row on click */
.disc-detail-panel {
  grid-column: 1 / -1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 22px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  display: flex; gap: 18px;
  animation: panelIn 0.2s ease;
  position: relative;
}
@keyframes panelIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.disc-panel-cover {
  width: 80px; height: 120px; object-fit: cover;
  border-radius: 4px 6px 6px 4px;
  box-shadow: 2px 3px 10px rgba(0,0,0,0.2);
  flex-shrink: 0;
}
.disc-panel-cover-ph {
  width: 80px; height: 120px; border-radius: 4px 6px 6px 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.disc-panel-body { flex: 1; min-width: 0; }
.disc-panel-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px; font-weight: 700; color: var(--ink);
  margin-bottom: 2px; line-height: 1.3;
}
.disc-panel-author {
  font-size: 12px; color: var(--rose); font-weight: 700; margin-bottom: 10px;
}
.disc-panel-desc {
  font-size: 11.5px; color: var(--ink3); line-height: 1.65;
  margin-bottom: 12px; max-height: 100px; overflow-y: auto;
}
.disc-panel-desc::-webkit-scrollbar { width: 3px; }
.disc-panel-desc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.disc-panel-meta {
  display: flex; gap: 14px; flex-wrap: wrap;
  font-size: 10px; color: var(--ink3); font-weight: 700;
  margin-bottom: 14px;
}
.disc-panel-add {
  padding: 9px 22px; border-radius: 20px;
  background: var(--rose); color: #fff; border: none;
  font-size: 12px; font-weight: 800; cursor: pointer;
  font-family: 'Nunito', sans-serif; transition: background 0.15s;
}
.disc-panel-add:hover { background: var(--rose2); }
.disc-panel-add.added { background: var(--sage); cursor: default; }
.disc-panel-already {
  padding: 9px 22px; border-radius: 20px;
  background: rgba(122,154,106,0.15); color: var(--sage);
  border: 1px solid rgba(122,154,106,0.3);
  font-size: 12px; font-weight: 800;
  font-family: 'Nunito', sans-serif;
}
.disc-panel-close {
  position: absolute; top: 12px; right: 14px;
  background: none; border: none; font-size: 16px;
  color: var(--ink3); cursor: pointer; line-height: 1;
  padding: 4px;
}
.disc-panel-close:hover { color: var(--ink); }

/* Skeleton loaders */
.disc-book-skeleton .disc-book-img-wrap {
  aspect-ratio: 2/3;
  background: linear-gradient(90deg, rgba(42,26,14,0.08) 25%, rgba(42,26,14,0.14) 50%, rgba(42,26,14,0.08) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
.disc-book-skeleton .disc-book-title-label {
  height: 10px; background: rgba(42,26,14,0.08); border-radius: 4px;
  margin-top: 8px; animation: shimmer 1.4s infinite;
  background-size: 200% 100%;
}
@keyframes shimmer { to { background-position: -200% 0; } }

.discover-empty {
  text-align: center; padding: 60px 20px; color: var(--ink3);
  font-style: italic; font-size: 14px;
}

/* PIN lock */
.pin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--rose); background: transparent;
  transition: background 0.15s;
}
.pin-dot.filled { background: var(--rose); }
.pin-dot.error  { border-color: #e05050; background: #e05050; animation: pinShake 0.4s; }
@keyframes pinShake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)}
}
.pin-numpad {
  display: grid; grid-template-columns: repeat(3, 64px);
  gap: 12px;
}
.pin-key {
  width: 64px; height: 64px; border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--card); color: var(--ink);
  font-size: 20px; font-weight: 600;
  cursor: pointer; font-family: "Nunito", sans-serif;
  transition: background 0.12s, transform 0.1s;
}
.pin-key:hover  { background: var(--rose-fill); }
.pin-key:active { transform: scale(0.93); }

/* Section "shelf board" underline */
.disc-shelf-board {
  height: 6px;
  background: linear-gradient(180deg, rgba(42,26,14,0.18) 0%, rgba(42,26,14,0.08) 100%);
  border-radius: 0 0 4px 4px;
  margin-top: 4px;
  box-shadow: 0 3px 0 rgba(42,26,14,0.07);
  margin-bottom: 32px;
}

/* Library 'show more' link */
.shelf-show-more {
  font-size: 11px; font-weight: 700; color: var(--rose);
  cursor: pointer; margin-top: 8px; display: inline-block;
  padding: 4px 0;
}
.shelf-show-more:hover { color: var(--rose2); }


.app { display: flex; height: 100vh; }

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
.sidebar {
  width: 230px; flex-shrink: 0;
  background: var(--sidebar);
  border-right: 1.5px solid var(--border);
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  background-image: repeating-linear-gradient(
    transparent, transparent 27px, rgba(180,140,140,0.07) 28px
  );
  background-size: 100% 28px;
}

.sidebar-header {
  padding: 28px 22px 20px;
  border-bottom: 1.5px solid rgba(200,140,60,0.15);
  flex-shrink: 0;
}
.sidebar-logo {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 32px;
  color: var(--sidebar-ink);
  line-height: 1;
  margin-bottom: 4px;
}
.sidebar-date {
  font-size: 10px; color: var(--sidebar-ink3);
  font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase;
}

/* Goal progress in sidebar */
.sidebar-goal {
  padding: 14px 22px;
  border-bottom: 1.5px solid rgba(200,140,60,0.15);
  flex-shrink: 0;
}
.sg-label {
  font-size: 9px; font-weight: 700; color: var(--sidebar-ink3);
  letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 7px;
}
.sg-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
.sg-nums { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--rose2); line-height: 1; }
.sg-of { font-size: 10px; color: var(--sidebar-ink2); font-weight: 600; }
.sg-track { height: 6px; background: rgba(200,112,58,0.2); border-radius: 3px; overflow: hidden; }
.sg-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--rose2)); border-radius: 3px; transition: width 0.4s ease; }

/* Nav items — no individual scroll, part of scrollable middle */
.sidebar-nav { padding: 14px 12px 6px; }
.sidebar-nav::-webkit-scrollbar { display: none; }
.nav-section-label {
  font-size: 8px; font-weight: 800; color: var(--sidebar-ink3);
  letter-spacing: 2px; text-transform: uppercase;
  padding: 0 10px; margin-bottom: 4px; margin-top: 12px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 11px; cursor: pointer;
  transition: all 0.14s; user-select: none; margin-bottom: 2px;
  font-size: 13px; font-weight: 700; color: var(--sidebar-ink);
}
.nav-item:hover { background: rgba(255,180,80,0.1); color: var(--sidebar-ink); }
.nav-item.active { background: rgba(200,112,58,0.22); color: var(--rose2); }
.nav-icon {
  width: 24px; height: 24px; border-radius: 7px;
  background: rgba(200,112,58,0.18);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.14s;
  color: var(--sidebar-ink2);
}
.nav-item.active .nav-icon {
  background: rgba(200,112,58,0.35);
  color: var(--rose2);
}
.nav-item:hover .nav-icon { background: rgba(200,112,58,0.25); }
.nav-badge {
  margin-left: auto; background: rgba(200,112,58,0.2);
  color: var(--rose2); font-size: 9px; font-weight: 800;
  padding: 2px 7px; border-radius: 20px;
}

/* Scrollable middle — nav + tag filter together */
.sidebar-scroll {
  flex: 1; overflow-y: auto; min-height: 0;
  display: flex; flex-direction: column;
}
.sidebar-scroll::-webkit-scrollbar { width: 3px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(200,112,58,0.3); border-radius: 2px; }

/* Tag filter */
.sidebar-tags { padding: 8px 12px 16px; border-top: 1.5px solid rgba(200,140,60,0.15); }
.sidebar-tags-label {
  font-size: 8px; font-weight: 800; color: var(--sidebar-ink3);
  letter-spacing: 2px; text-transform: uppercase;
  padding: 0 10px; margin-bottom: 6px; margin-top: 8px;
}
.tag-filter-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 9px; cursor: pointer;
  transition: all 0.14s; user-select: none; margin-bottom: 2px;
  font-size: 11px; font-weight: 700; color: var(--sidebar-ink);
}
.tag-filter-item:hover { background: rgba(255,180,80,0.1); }
.tag-filter-item.active { background: rgba(200,112,58,0.18); }
.tfi-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.tfi-count { margin-left: auto; font-size: 9px; color: var(--sidebar-ink3); font-weight: 700; }

/* Add book button */
.sidebar-add {
  padding: 14px 16px;
  border-top: 1.5px solid rgba(200,140,60,0.15);
  flex-shrink: 0;
}
.add-btn {
  width: 100%; padding: 11px;
  background: linear-gradient(135deg, var(--rose), var(--rose2));
  border: none; border-radius: 12px;
  color: #fff; font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 800; cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.add-btn:hover { opacity: 0.9; }
.add-btn:active { transform: scale(0.98); }
.import-btn {
  width: 100%; padding: 9px;
  background: none;
  border: 1.5px solid rgba(200,140,60,0.25); border-radius: 12px;
  color: var(--sidebar-ink2); font-family: 'Nunito', sans-serif;
  font-size: 11px; font-weight: 700; cursor: pointer;
  transition: all 0.15s; margin-top: 8px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.import-btn:hover { border-color: var(--rose2); color: var(--rose2); background: rgba(200,112,58,0.08); }

/* ── Want to Read import panel ── */
.wtr-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.wtr-tab {
  padding:6px 12px; border-radius:20px; font-size:11px; font-weight:700;
  cursor:pointer; border:1.5px solid var(--border); color:var(--ink2);
  background:transparent; transition:all 0.14s; font-family:inherit;
}
.wtr-tab.active { background:var(--rose); color:#fff; border-color:var(--rose); }
.wtr-tab:hover:not(.active) { background:rgba(200,122,138,0.08); color:var(--ink); }
.wtr-panel { display:none; }
.wtr-panel.active { display:block; }
.wtr-input { width:100%; padding:10px 12px; border:1.5px solid var(--border);
  border-radius:10px; font-size:13px; font-family:inherit; background:var(--card);
  color:var(--ink); outline:none; box-sizing:border-box; resize:none; }
.wtr-input:focus { border-color:var(--rose); }
.wtr-btn { margin-top:8px; width:100%; padding:11px; background:linear-gradient(135deg,var(--rose),var(--rose2));
  border:none; border-radius:10px; color:#fff; font-size:13px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:opacity 0.14s; }
.wtr-btn:hover { opacity:0.9; }
.wtr-btn:disabled { opacity:0.5; cursor:default; }
.wtr-results { margin-top:12px; display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto; }
.wtr-book-card {
  display:flex; gap:10px; align-items:center; padding:10px 12px;
  background:var(--card); border:1.5px solid var(--border); border-radius:12px; cursor:pointer;
  transition:all 0.14s;
}
.wtr-book-card:hover { border-color:var(--rose); background:rgba(200,122,138,0.05); }
.wtr-book-thumb { width:36px; height:50px; object-fit:cover; border-radius:4px; flex-shrink:0; background:var(--rose-fill); }
.wtr-book-info { flex:1; min-width:0; }
.wtr-book-title { font-size:13px; font-weight:800; color:var(--ink); margin-bottom:2px; }
.wtr-book-author { font-size:11px; color:var(--ink2); font-weight:600; }
.wtr-add-pill { font-size:11px; font-weight:700; color:var(--rose); white-space:nowrap; }
.wtr-hint { font-size:11px; color:var(--ink3); margin-top:8px; line-height:1.5; }
.wtr-status { font-size:12px; color:var(--ink2); margin-top:8px; font-style:italic; }

/* ══════════════════════════════════════
   MAIN AREA
══════════════════════════════════════ */
.main {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; height: 100vh; overflow: hidden;
}

/* Top bar */
.topbar {
  padding: 18px 32px 14px;
  border-bottom: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  background: rgba(247,240,237,0.92);
  backdrop-filter: blur(10px);
}
.topbar-title {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 24px; color: var(--ink); line-height: 1;
}
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-stats {
  display: flex; gap: 6px;
}
.ts-chip {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 5px 12px;
  font-size: 11px; font-weight: 700; color: var(--ink2);
  display: flex; align-items: center; gap: 4px;
}
.ts-chip span { color: var(--rose); }
.sort-row { display: flex; align-items: center; gap: 6px; }
.sort-label { font-size: 9px; font-weight: 800; color: var(--ink3); letter-spacing: 1px; text-transform: uppercase; }
.sort-btn {
  font-size: 10px; font-weight: 700; padding: 4px 11px;
  border-radius: 20px; border: 1.5px solid var(--border2);
  background: rgba(255,255,255,0.5); color: var(--ink2);
  cursor: pointer; transition: all 0.14s;
}
.sort-btn.active { background: var(--rose); color: #fff; border-color: var(--rose); }

/* Content area */
.content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 28px 32px 32px;
}
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--rose-fill); border-radius: 3px; }

/* ══════════════════════════════════════
   SECTION HEADER
══════════════════════════════════════ */
.sec-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; margin-top: 6px;
}
.sec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rose); flex-shrink: 0; }
.sec-title {
  font-size: 10px; font-weight: 800; color: var(--ink2);
  text-transform: uppercase; letter-spacing: 2px;
}
.sec-divider { flex: 1; border-bottom: 1px dashed rgba(180,140,140,0.25); }
.sec-count { font-size: 10px; color: var(--ink3); font-weight: 700; }

/* ══════════════════════════════════════
   BOOK GRID — currently reading (large cards)
══════════════════════════════════════ */
.reading-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}

.book-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 16px;
  display: flex; gap: 16px;
  box-shadow: 0 2px 12px rgba(180,120,120,0.07);
  transition: transform 0.12s, box-shadow 0.12s;
  cursor: pointer;
  position: relative; overflow: hidden;
}
.book-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: linear-gradient(180deg, var(--rose), var(--rose2));
  border-radius: 16px 0 0 16px;
}
.book-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(180,120,120,0.13);
}

.bc-cover {
  width: 72px; height: 106px;
  border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; border: 1px solid var(--border2);
  overflow: hidden; background: var(--rose-light);
}
.bc-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 9px; }

.bc-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.bc-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.3; margin-bottom: 2px; }
.bc-author { font-size: 11px; color: var(--ink2); font-weight: 600; margin-bottom: 8px; }

.stats-top { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(58,42,42,0.4);
  backdrop-filter: blur(5px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.22s;
  padding: 20px;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: #faf4f1;
  border-radius: 20px;
  width: 100%; max-width: 560px;
  padding: 28px 30px 32px;
  max-height: 90vh; overflow-y: auto;
  transform: scale(0.96) translateY(10px);
  transition: transform 0.22s;
  box-shadow: 0 20px 60px rgba(180,100,100,0.18);

}

.modal-close {

.color-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 9px; margin-top: 4px; }
.color-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.12s, border-color 0.12s; }

/* ══════════════════════════════════════

<script>
// ════════════════════════════════════════════
// PALETTE
// ════════════════════════════════════════════
const PALETTE = [
  { bg:'rgba(160,140,210,0.15)', color:'#6848b0', border:'rgba(160,140,210,0.35)' },
  { bg:'rgba(140,180,140,0.15)', color:'#3a6a3a', border:'rgba(140,180,140,0.35)' },
  { bg:'rgba(210,130,150,0.15)', color:'#a03058', border:'rgba(210,130,150,0.35)' },
  { bg:'rgba(220,130,80,0.12)',  color:'#a04818', border:'rgba(220,130,80,0.30)'  },
  { bg:'rgba(100,160,200,0.15)', color:'#285878', border:'rgba(100,160,200,0.35)' },
  { bg:'rgba(80,60,100,0.12)',   color:'#483060', border:'rgba(80,60,100,0.28)'   },
  { bg:'rgba(180,160,120,0.15)', color:'#605020', border:'rgba(180,160,120,0.35)' },
  { bg:'rgba(180,100,100,0.15)', color:'#882030', border:'rgba(180,100,100,0.35)' },
  { bg:'rgba(100,180,180,0.15)', color:'#206060', border:'rgba(100,180,180,0.35)' },
  { bg:'rgba(200,180,100,0.15)', color:'#705010', border:'rgba(200,180,100,0.35)' },
  { bg:'rgba(160,200,140,0.15)', color:'#306020', border:'rgba(160,200,140,0.35)' },
  { bg:'rgba(200,140,200,0.15)', color:'#703070', border:'rgba(200,140,200,0.35)' },
  { bg:'rgba(140,180,220,0.15)', color:'#204888', border:'rgba(140,180,220,0.35)' },
  { bg:'rgba(220,200,140,0.15)', color:'#605008', border:'rgba(220,200,140,0.35)' },
];

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
function defaultState() {
  return {
    books: [
      { id:1, title:'The Midnight Library', author:'Matt Haig', status:'reading', coverEmoji:'📗', coverImg:null, tags:['Fiction'], rating:4, spice:1, progress:55, pages:304, currentPage:187, note:'Beautiful and melancholy — loving this one.', dateRead:null, series:null },
      { id:2, title:'Fourth Wing', author:'Rebecca Yarros', status:'reading', coverEmoji:'📘', coverImg:null, tags:['Fantasy','Romance','Spicy','Series'], rating:5, spice:3, progress:78, pages:517, currentPage:312, note:'Cannot put this down. Xaden 🔥', dateRead:null, series:'The Empyrean' },
      { id:3, title:'A Court of Thorns and Roses', author:'Sarah J. Maas', status:'read', coverEmoji:'📕', coverImg:null, tags:['Fantasy','Romance','Series'], rating:5, spice:3, progress:100, pages:419, currentPage:419, note:'', dateRead:'2026-02-14', series:'ACOTAR' },
      { id:4, title:'Tomorrow, and Tomorrow, and Tomorrow', author:'Gabrielle Zevin', status:'read', coverEmoji:'📙', coverImg:null, tags:['Fiction','Contemporary'], rating:4, spice:1, progress:100, pages:480, currentPage:480, note:'', dateRead:'2026-01-28', series:null },
      { id:5, title:'Iron Flame', author:'Rebecca Yarros', status:'tbr', coverEmoji:'📗', coverImg:null, tags:['Fantasy','Romance','Series'], rating:0, spice:0, progress:0, pages:623, currentPage:0, note:'', dateRead:null, series:'The Empyrean' },
      { id:6, title:'A Court of Mist and Fury', author:'Sarah J. Maas', status:'tbr', coverEmoji:'📘', coverImg:null, tags:['Fantasy','Romance','Series'], rating:0, spice:0, progress:0, pages:626, currentPage:0, note:'', dateRead:null, series:'ACOTAR' },
    ],
    tags: [
      { id:1, name:'Fiction',      paletteIdx:1 },
      { id:2, name:'Fantasy',      paletteIdx:0 },
      { id:3, name:'Romance',      paletteIdx:2 },
      { id:4, name:'Spicy',        paletteIdx:3 },
      { id:5, name:'Series',       paletteIdx:4 },
      { id:6, name:'Contemporary', paletteIdx:6 },
      { id:7, name:'Dark',         paletteIdx:5 },
    ],
    goal: 12,
    nextId: 10,
    filterTag: 'All',
    sortRead: 'date',
  };
}

let state = defaultState();

// ════════════════════════════════════════════
// FIREBASE + PIN
// ════════════════════════════════════════════
const FB_URL = 'https://read-e5cc2-default-rtdb.firebaseio.com/read';

async function dbRead() {
  try {
    const r = await fetch(FB_URL + '.json');
    return await r.json();
  } catch(e) { return null; }
}

async function dbWrite(data) {
  try {
    await fetch(FB_URL + '.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch(e) {}
}

let dbRecord = { pin: '', state: {} };

async function save() {
  dbRecord.state = state;
  await dbWrite(dbRecord);
}

function showPinLock() { document.getElementById('pinLock').style.display = 'flex'; }
function hidePinLock()  { document.getElementById('pinLock').style.display = 'none'; }

let pinEntry = '';
function pinPress(d) {
  if (pinEntry.length >= 4) return;
  pinEntry += d;
  updatePinDots();
  if (pinEntry.length === 4) setTimeout(submitPin, 120);
}
function pinBackspace() { pinEntry = pinEntry.slice(0,-1); updatePinDots(); }
function updatePinDots() {
  document.querySelectorAll('.pin-dot').forEach((dot,i) => dot.classList.toggle('filled', i < pinEntry.length));
}
async function submitPin() {
  if (!dbRecord.pin) {
    dbRecord.pin = pinEntry;
    dbRecord.state = state;
    await dbWrite(dbRecord);
    hidePinLock();
    renderContent();
    updateSidebar();
  } else if (pinEntry === dbRecord.pin) {
    hidePinLock();
    renderContent();
    updateSidebar();
  } else {
    document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error'));
    document.getElementById('pinError').textContent = 'Incorrect PIN';
    setTimeout(() => {
      document.querySelectorAll('.pin-dot').forEach(d => { d.classList.remove('filled','error'); });
      document.getElementById('pinError').textContent = '';
      pinEntry = '';
    }, 900);
  }
}

document.addEventListener('keydown', e => {
  if (document.getElementById('pinLock').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') pinPress(e.key);
  if (e.key === 'Backspace') pinBackspace();
});

async function initAuth() {
  const data = await dbRead();
  if (data && data.state && Object.keys(data.state).length) {
    dbRecord = data;
    state = data.state;
    if (!state.books)     state.books = [];
    if (!state.tags)      state.tags = defaultState().tags;
    if (!state.goal)      state.goal = 12;
    if (!state.nextId)    state.nextId = (Math.max(0, ...state.books.map(b=>b.id||0)) + 1);
    if (!state.filterTag) state.filterTag = 'All';
    if (!state.sortRead)  state.sortRead = 'date';

    // One-time fix: find any date shared by more than 10 read books
    // (sign of bulk-stamping during import) and clear those back to null
    const dateCounts = {};
    state.books.filter(b=>b.status==='read'&&b.dateRead).forEach(b => {
      dateCounts[b.dateRead] = (dateCounts[b.dateRead]||0)+1;
    });
    const bulkDates = Object.entries(dateCounts).filter(([d,n]) => n > 10).map(([d])=>d);
    if (bulkDates.length) {
      let fixed = 0;
      state.books.forEach(b => {
        if (b.status==='read' && bulkDates.includes(b.dateRead)) { b.dateRead = null; fixed++; }
      });
      if (fixed > 0) { console.log(`Cleared ${fixed} bulk-stamped dates`); await save(); }
    }
  }
  // Always show PIN screen — either to set one (first time) or to enter it
  showPinLock();
  if (!dbRecord.pin) {
    document.getElementById('pinError').textContent = 'Choose a 4-digit PIN to protect your library';
  }
}

function openChangePin() {
  let step = 1, newPin = '', cpEntry = '';
  const dotHtml = [0,1,2,3].map(i=>`<div class="pin-dot" id="cpd${i}"></div>`).join('');
  const padHtml = [1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>
    k===''?`<div></div>`:k==='⌫'?`<button class="pin-key" onclick="cpBackspace()">⌫</button>`:
    `<button class="pin-key" onclick="cpPress('${k}')">${k}</button>`).join('');
  openModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Change PIN</div>
    <div id="changePinBody" style="text-align:center;padding:20px 0">
      <div style="font-size:13px;color:var(--ink3);margin-bottom:20px">Enter your current PIN</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px">${dotHtml}</div>
      <div id="changePinError" style="color:#e05050;font-size:12px;min-height:16px;margin-bottom:12px"></div>
      <div class="pin-numpad">${padHtml}</div>
    </div>`);
  window.cpPress = (d) => {
    if (cpEntry.length >= 4) return;
    cpEntry += d;
    [0,1,2,3].forEach(i => document.getElementById(`cpd${i}`)?.classList.toggle('filled', i < cpEntry.length));
    if (cpEntry.length === 4) setTimeout(() => {
      if (step === 1) {
        if (cpEntry !== dbRecord.pin) {
          document.getElementById('changePinError').textContent = 'Incorrect PIN';
          setTimeout(()=>{ cpEntry=''; [0,1,2,3].forEach(i=>document.getElementById(`cpd${i}`)?.classList.remove('filled','error')); document.getElementById('changePinError').textContent=''; },900);
          return;
        }
        step=2; cpEntry='';
        document.getElementById('changePinBody').innerHTML = `
          <div style="font-size:13px;color:var(--ink3);margin-bottom:20px">Enter your new PIN</div>
          <div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px">${dotHtml}</div>
          <div id="changePinError" style="color:#e05050;font-size:12px;min-height:16px;margin-bottom:12px"></div>
          <div class="pin-numpad">${padHtml}</div>`;
      } else {
        dbRecord.pin = cpEntry;
        save(); closeModal(); showToast('🔒 PIN updated!');
      }
    }, 120);
  };
  window.cpBackspace = () => {
    cpEntry = cpEntry.slice(0,-1);
    [0,1,2,3].forEach(i => document.getElementById(`cpd${i}`)?.classList.toggle('filled', i < cpEntry.length));
  };
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const todayISO = () => new Date().toISOString().split('T')[0];
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso+'T12:00:00').toLocaleDateString('default',{month:'short',day:'numeric',year:'numeric'});
}
function getTag(name) { return state.tags.find(t=>t.name===name); }
function tagHTML(name, small=false) {
  const tag = getTag(name);
  if (!tag) return '';
  const p = PALETTE[tag.paletteIdx % PALETTE.length];
  return `<span class="bc-tag" style="background:${p.bg};color:${p.color};border:1px solid ${p.border};${small?'font-size:9px;padding:2px 7px;':'font-size:9px;padding:2px 8px;'}">${esc(name)}</span>`;
}
function coverHTML(book, w=72, h=106, r=10) {
  if (book.coverImg) return `<img src="${book.coverImg}" style="width:${w}px;height:${h}px;object-fit:cover;border-radius:${r}px" loading="eager">`;
  return `<span style="font-size:${Math.round(w*0.42)}px">${book.coverEmoji||'📖'}</span>`;
}
function starsHTML(rating, cls='bst') {
  return Array.from({length:5},(_,i)=>`<span class="${cls}${i<rating?'':' e'}">★</span>`).join('');
}
function peppersHTML(spice, cls='bpp') {
  return Array.from({length:5},(_,i)=>`<span class="${cls}${i<spice?'':' e'}">🌶️</span>`).join('');
}
function showToast(msg, dur=2200) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}
function filteredBooks() {
  if (state.filterTag==='All') return state.books;
  return state.books.filter(b=>(b.tags||[]).includes(state.filterTag));
}

// ════════════════════════════════════════════
// SIDEBAR + HEADER UPDATE
// ════════════════════════════════════════════
function updateSidebar() {
  const now = new Date();
  document.getElementById('sidebarDate').textContent =
    now.toLocaleDateString('default',{weekday:'long',month:'long',day:'numeric'});

  const readCount = state.books.filter(b=>b.status==='read').length;
  const pct = Math.min(readCount/(state.goal||12)*100,100);
  document.getElementById('sgNums').textContent = readCount;
  document.getElementById('sgOf').textContent = `of ${state.goal||12} books`;
  document.getElementById('sgFill').style.width = pct+'%';

  // Nav badges
  document.getElementById('nbLibrary').textContent = state.books.length;
  
  document.getElementById('nbTbr').textContent = state.books.filter(b=>b.status==='tbr').length;
  document.getElementById('nbRead').textContent = readCount;

  // Tag filters
  const container = document.getElementById('sidebarTagFilters');
  let html = `<div class="tag-filter-item ${state.filterTag==='All'?'active':''}" onclick="setFilter('All')">
    <div class="tfi-dot" style="background:var(--rose)"></div>
    <span style="font-size:11px;font-weight:700;color:${state.filterTag==='All'?'var(--rose)':'var(--ink2)'}">All Books</span>
    <span class="tfi-count">${state.books.length}</span>
  </div>`;
  state.tags.forEach(tag=>{
    const p = PALETTE[tag.paletteIdx%PALETTE.length];
    const count = state.books.filter(b=>(b.tags||[]).includes(tag.name)).length;
    const active = state.filterTag===tag.name;
    html+=`<div class="tag-filter-item ${active?'active':''}" onclick="setFilter('${esc(tag.name)}')">
      <div class="tfi-dot" style="background:${p.color}"></div>
      <span style="font-size:11px;font-weight:700;color:${active?p.color:'var(--ink2)'};">${esc(tag.name)}</span>
      <span class="tfi-count">${count}</span>
    </div>`;
  });
  container.innerHTML = html;
}
function setFilter(tag) { state.filterTag=tag; save(); updateSidebar(); renderContent(); }
function setSort(s) {
  state.sortRead=s; save();
  ['date','rating','title'].forEach(x=>{
    const el=document.getElementById('sort-'+x);
    if(el) el.classList.toggle('active',x===s);
  });
  renderContent();
}

// ════════════════════════════════════════════
// TAB ROUTING
// ════════════════════════════════════════════
let currentTab = 'library';
function showTab(tab) {
  currentTab = tab;
  ['library','reading','tbr','read','series','adventure','stats','tags','discover'].forEach(t=>{
    const n=document.getElementById('nav-'+t);
    if(n) n.classList.toggle('active',t===tab);
  });
  const sortRow = document.getElementById('sortRow');
  if (sortRow) sortRow.style.display = tab==='read'?'flex':'none';
  renderContent();
}

function renderContent() {
  updateSidebar();
  const c = document.getElementById('mainContent');
  const titles = {library:'Library',reading:'Reading Now',tbr:'Want to Read',read:'Read',series:'Series',adventure:'Choose for Me',stats:'Stats',tags:'My Tags',discover:'Discover'};
  document.getElementById('topbarTitle').textContent = titles[currentTab]||currentTab;
  if (currentTab==='library') { c.innerHTML=renderLibrary(); renderTopbarStats(); }
  if (currentTab==='reading') { c.innerHTML=renderShelf('reading'); renderTopbarStats(); }
  if (currentTab==='tbr')     { c.innerHTML=renderShelf('tbr'); renderTopbarStats(); }
  if (currentTab==='read')    { c.innerHTML=renderShelf('read'); renderTopbarStats(); }
  if (currentTab==='series')  { c.innerHTML=renderSeries(); document.getElementById('topbarStats').innerHTML=''; }
  if (currentTab==='adventure') { c.innerHTML=renderAdventure(); document.getElementById('topbarStats').innerHTML=''; requestAnimationFrame(initWheel); }
  if (currentTab==='stats')   { c.innerHTML=renderStats(); document.getElementById('topbarStats').innerHTML=''; }
  if (currentTab==='tags')    { c.innerHTML=renderTagsTab(); document.getElementById('topbarStats').innerHTML=''; }
  if (currentTab==='discover') { renderDiscover(); document.getElementById('topbarStats').innerHTML=''; }
}

function renderTopbarStats() {
  const books = filteredBooks();
  const reading=books.filter(b=>b.status==='reading').length;
  const tbr=books.filter(b=>b.status==='tbr').length;
  const read=books.filter(b=>b.status==='read').length;
  document.getElementById('topbarStats').innerHTML=`
    <div class="ts-chip">📖 <span>${reading}</span> reading</div>
    <div class="ts-chip">✅ <span>${read}</span> read</div>
    <div class="ts-chip">📋 <span>${tbr}</span> to read</div>`;
}

// ════════════════════════════════════════════
// RENDER: LIBRARY (all)
// ════════════════════════════════════════════
function renderLibrary() {
  const books = filteredBooks();
  const reading = books.filter(b=>b.status==='reading');
  const tbr     = books.filter(b=>b.status==='tbr');
  const read    = books.filter(b=>b.status==='read');

  if (!books.length) return `<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-text">No books here yet.<br>Click <b>Add Book</b> to get started.</div></div>`;

  // ── Pie chart helper (reused from stats) ──
  function miniPie(segments, size=90) {
    const total = segments.reduce((a,s)=>a+s.value,0);
    if (!total) return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${size/2-8}" fill="none" stroke="var(--rose-fill)" stroke-width="16"/></svg>`;
    const cx=size/2,cy=size/2,r=size/2-8,inner=r-16;
    let angle=-Math.PI/2,paths='';
    segments.forEach(seg=>{
      if(!seg.value) return;
      const slice=(seg.value/total)*Math.PI*2;
      const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      const x2=cx+r*Math.cos(angle+slice),y2=cy+r*Math.sin(angle+slice);
      const xi1=cx+inner*Math.cos(angle),yi1=cy+inner*Math.sin(angle);
      const xi2=cx+inner*Math.cos(angle+slice),yi2=cy+inner*Math.sin(angle+slice);
      const large=slice>Math.PI?1:0;
      paths+=`<path d="M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${inner} ${inner} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${seg.color}" opacity="0.9"/>`;
      angle+=slice;
    });
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`;
  }

  // ── Build pie data ──
  const now=new Date(), curMonth=now.getMonth(), curYear=now.getFullYear();
  const tagColors=['#c8703a','#5a8fd0','#5aaa6a','#9a5ab0','#d0aa3a','#d05a6a','#5aaab0'];
  const tagCounts={};
  books.forEach(b=>(b.tags||[]).forEach(t=>{tagCounts[t]=(tagCounts[t]||0)+1;}));
  const sortedTags=Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]);

  const monthRead=read.filter(b=>b.dateRead&&new Date(b.dateRead+'T12:00:00').getMonth()===curMonth&&new Date(b.dateRead+'T12:00:00').getFullYear()===curYear);
  const yearRead=read.filter(b=>b.dateRead&&new Date(b.dateRead+'T12:00:00').getFullYear()===curYear);

  const mkSegs=(bks)=>{
    const tc={};
    bks.forEach(b=>(b.tags||[]).forEach(t=>{tc[t]=(tc[t]||0)+1;}));
    const segs=sortedTags.slice(0,6).map(([name],i)=>({label:name,value:tc[name]||0,color:tagColors[i]})).filter(s=>s.value>0);
    return segs.length?segs:[{label:'No data',value:1,color:'var(--rose-fill)'}];
  };
  const monthSegs=mkSegs(monthRead), yearSegs=mkSegs(yearRead);
  const legend=(segs)=>segs.filter(s=>s.label!=='No data').map(s=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><div style="width:7px;height:7px;border-radius:50%;background:${s.color};flex-shrink:0"></div><span style="font-size:9px;font-weight:700;color:var(--ink2)">${esc(s.label)}</span><span style="margin-left:auto;font-size:9px;color:var(--ink3);font-weight:700">${s.value}</span></div>`).join('');

  const monthPages=monthRead.reduce((a,b)=>a+(b.pages||0),0);
  const yearPages=yearRead.reduce((a,b)=>a+(b.pages||0),0);

  const overviewHTML = `
  <div class="lib-overview fade-in">
    <div class="lib-pie-card">
      <div class="lib-pie-title">This Month</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        ${miniPie(monthSegs,90)}
        <div>
          <div style="font-family:'Playfair Display',serif;font-size:26px;color:var(--rose);line-height:1">${monthRead.length}</div>
          <div style="font-size:8px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">books</div>
          <div style="font-size:11px;font-weight:700;color:var(--ink)">${monthPages.toLocaleString()} <span style="font-size:8px;color:var(--ink2)">pages</span></div>
          <div style="font-size:11px;font-weight:700;color:var(--ink)">${Math.round(monthPages*250/1000)||0}k <span style="font-size:8px;color:var(--ink2)">words</span></div>
        </div>
      </div>
      ${legend(monthSegs)}
    </div>
    <div class="lib-pie-card">
      <div class="lib-pie-title">This Year</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        ${miniPie(yearSegs,90)}
        <div>
          <div style="font-family:'Playfair Display',serif;font-size:26px;color:var(--rose);line-height:1">${yearRead.length}</div>
          <div style="font-size:8px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">books</div>
          <div style="font-size:11px;font-weight:700;color:var(--ink)">${yearPages.toLocaleString()} <span style="font-size:8px;color:var(--ink2)">pages</span></div>
          <div style="font-size:11px;font-weight:700;color:var(--ink)">${Math.round(yearPages*250/1000)||0}k <span style="font-size:8px;color:var(--ink2)">words</span></div>
        </div>
      </div>
      ${legend(yearSegs)}
    </div>
    <div class="lib-covers-card">
      <div class="lib-pie-title">My Library</div>
      <div class="lib-covers-grid">
        ${books.slice(0,18).map(b=>`<div class="lib-cover-thumb" onclick="openBookDetail(${b.id})" title="${esc(b.title)}">${coverHTML(b,40,58,5)}</div>`).join('')}
        ${books.length>18?`<div class="lib-covers-more">+${books.length-18}</div>`:''}
      </div>
    </div>
  </div>`;

  let html = overviewHTML;

  if (tbr.length) {
    html += sectionHeader('Want to Read', tbr.length, '#7a9a7a');
    const shown = tbr.slice(0, 10);
    html += `<div class="books-grid-tiles">` + shown.map(b=>bookTile(b)).join('') + `</div>`;
    if (tbr.length > 10) html += `<div class="shelf-show-more" onclick="showTab('tbr')">See all ${tbr.length} books →</div>`;
  }
  if (read.length) {
    const sorted = sortBooks(read);
    html += sectionHeader('Read', read.length, '#9a7060');
    const shown = sorted.slice(0, 10);
    html += `<div class="books-grid-tiles">` + shown.map(b=>bookTile(b,true)).join('') + `</div>`;
    if (read.length > 10) html += `<div class="shelf-show-more" onclick="showTab('read')">See all ${read.length} books →</div>`;
  }

  // ── Hall of Fame ──
  const fiveStars = state.books.filter(b=>b.status==='read' && b.rating===5);
  if (fiveStars.length) {
    html += `<div class="hof-section fade-in">
      <div class="hof-header">
        <span class="hof-crown">👑</span>
        <div>
          <div class="hof-title">Hall of Fame</div>
          <div class="hof-sub">Five-Star Reads</div>
        </div>
      </div>
      <div class="hof-shelf">
        ${fiveStars.map(b=>`
          <div class="hof-book" onclick="openBookDetail(${b.id})" title="${esc(b.title)}">
            <div class="hof-cover">${coverHTML(b,72,108,9)}</div>
            <div class="hof-stars">★★★★★</div>
            <div class="hof-book-title">${esc(b.title)}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  return html;
}

// ════════════════════════════════════════════
// RENDER: SHELF (single status)
// ════════════════════════════════════════════
function renderShelf(status) {
  const books = sortBooks(filteredBooks().filter(b=>b.status===status));
  if (!books.length) return `<div class="empty-state"><div class="empty-icon">${status==='reading'?'📖':status==='tbr'?'📋':'✅'}</div><div class="empty-text">No books in this shelf yet.</div></div>`;
  if (status==='reading') {
    return `<div class="reading-grid">` + books.map(b=>bigBookCard(b)).join('') + `</div>`;
  }
  return `<div class="books-grid-tiles">` + books.map(b=>bookTile(b, status==='read')).join('') + `</div>`;
}

function sortBooks(books) {
  return [...books].sort((a,b)=>{
    if (state.sortRead==='date')   return (b.dateRead||'9999') > (a.dateRead||'9999') ? 1 : -1;
    if (state.sortRead==='rating') return b.rating-a.rating;
    if (state.sortRead==='title')  return a.title.localeCompare(b.title);
    return 0;
  });
}

function sectionHeader(label, count, color='var(--rose)') {
  return `<div class="sec-header">
    <div class="sec-dot" style="background:${color}"></div>
    <div class="sec-title">${label}</div>
    <div class="sec-divider"></div>
    <div class="sec-count">${count} book${count===1?'':'s'}</div>
  </div>`;
}

function bigBookCard(b) {
  return `<div class="book-card fade-in" onclick="openBookDetail(${b.id})">
    <div class="bc-cover">${coverHTML(b,72,106,10)}</div>
    <div class="bc-body">
      <div class="bc-title">${esc(b.title)}</div>
      <div class="bc-author">${esc(b.author)}${b.series?` · <em style="color:var(--ink3);font-style:italic">${esc(b.series)}</em>`:''}</div>
      <div class="bc-tags">${(b.tags||[]).map(t=>tagHTML(t)).join('')}</div>
      <div class="bc-progress">
        <div class="bc-prog-meta">
          <span>p.${b.currentPage||0} of ${b.pages||'?'}</span>
          <span>${b.progress||0}%</span>
        </div>
        <div class="bc-track"><div class="bc-fill" style="width:${b.progress||0}%"></div></div>
      </div>
      <div class="bc-bottom">
        <div class="bc-stars">${starsHTML(b.rating)}</div>
        <div class="bc-peppers">${peppersHTML(b.spice)}</div>
      </div>
      ${b.note?`<div class="bc-note">"${esc(b.note)}"</div>`:''}
    </div>
  </div>`;
}

function bookTile(b, showDate=false) {
  const stars = [1,2,3,4,5].map(i=>`<span class="btst${b.rating>=i?'':' e'}">★</span>`).join('');
  const peppers = b.spice>0 ? [1,2,3].map(i=>`<span class="bpp${b.spice>=i?'':' e'}">🌶️</span>`).join('') : '';
  const snippet = b.note ? `<div class="bt-note">"${esc(b.note.length>60?b.note.slice(0,58)+'…':b.note)}"</div>` : '';
  return `<div class="book-tile fade-in" onclick="openBookDetail(${b.id})">
    <div class="bt-cover">${coverHTML(b,110,165,10)}</div>
    <div class="bt-title">${esc(b.title)}</div>
    <div class="bt-author">${esc(b.author)}</div>
    ${b.rating>0?`<div class="bt-stars">${stars}</div>`:''}
    ${peppers?`<div style="display:flex;gap:1px;margin-top:2px">${peppers}</div>`:''}
    ${showDate&&b.dateRead?`<div style="font-size:9px;color:var(--ink3);margin-top:2px">📅 ${fmtDate(b.dateRead)}</div>`:''}
    ${showDate?snippet:''}
  </div>`;
}

// ════════════════════════════════════════════
// RENDER: SERIES
// ════════════════════════════════════════════
function renderSeries() {
  const map = {};
  state.books.filter(b=>b.series).forEach(b=>{
    if (!map[b.series]) map[b.series]=[];
    map[b.series].push(b);
  });
  const keys = Object.keys(map);
  if (!keys.length) return `<div class="empty-state"><div class="empty-icon">🔖</div><div class="empty-text">No series yet.<br>Add a series name when adding a book.</div></div>`;
  return `<div class="series-grid">` + keys.map(name=>{
    const books = map[name].slice().sort((a,b)=>(a.seriesOrder||999)-(b.seriesOrder||999));
    const readCount = books.filter(b=>b.status==='read').length;
    const pct = Math.round(readCount/books.length*100);
    return `<div class="series-card fade-in">
      <div class="sc-name">${esc(name)}</div>
      <div class="sc-progress">${readCount} of ${books.length} read · ${pct}% complete</div>
      <div class="sc-track"><div class="sc-fill" style="width:${pct}%"></div></div>
      <div class="sc-books">${books.map(b=>`
        <div class="sc-book" onclick="openBookDetail(${b.id})">
          <div class="sc-cover">${coverHTML(b,58,86,9)}</div>
          ${b.seriesOrder?`<div style="font-size:9px;font-weight:800;color:var(--rose);text-align:center;margin-top:2px">#${b.seriesOrder}</div>`:''}
          <div class="sc-book-title">${esc(b.title)}</div>
          <div class="sc-book-status">${b.status==='read'?'✅':b.status==='reading'?'📖':'📋'}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('') + `</div>`;
}

// ════════════════════════════════════════════
// RENDER: STATS
// ════════════════════════════════════════════
function renderStats() {
  const now = new Date();
  const curMonth = now.getMonth();
  const curYear = now.getFullYear();

  const read = state.books.filter(b=>b.status==='read');
  const totalPages = read.reduce((a,b)=>a+(b.pages||0),0);
  const totalWords = Math.round(totalPages * 250); // avg 250 words/page
  const avgRating = read.length?(read.reduce((a,b)=>a+b.rating,0)/read.length).toFixed(1):'—';
  const goalPct = Math.min(read.length/(state.goal||12)*100,100);

  // This month
  const thisMonthBooks = read.filter(b=>b.dateRead&&new Date(b.dateRead+'T12:00:00').getMonth()===curMonth&&new Date(b.dateRead+'T12:00:00').getFullYear()===curYear);
  const thisMonthPages = thisMonthBooks.reduce((a,b)=>a+(b.pages||0),0);
  const thisMonthWords = Math.round(thisMonthPages*250);

  // This year
  const thisYearBooks = read.filter(b=>b.dateRead&&new Date(b.dateRead+'T12:00:00').getFullYear()===curYear);
  const thisYearPages = thisYearBooks.reduce((a,b)=>a+(b.pages||0),0);
  const thisYearWords = Math.round(thisYearPages*250);

  // Monthly bar chart
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mCounts = Array(12).fill(0);
  read.forEach(b=>{ if(b.dateRead){const m=new Date(b.dateRead+'T12:00:00').getMonth(); if(new Date(b.dateRead+'T12:00:00').getFullYear()===curYear) mCounts[m]++;} });
  const maxM = Math.max(...mCounts,1);

  // Tag breakdown
  const tagCounts={};
  state.books.forEach(b=>(b.tags||[]).forEach(t=>{tagCounts[t]=(tagCounts[t]||0)+1;}));
  const maxTag=Math.max(...Object.values(tagCounts),1);

  // Pie chart SVG helper
  function pieChart(segments, size=110) {
    if (!segments.length || segments.every(s=>s.value===0)) {
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
        <circle cx="${size/2}" cy="${size/2}" r="${size/2-4}" fill="none" stroke="var(--rose-fill)" stroke-width="20"/>
        <text x="${size/2}" y="${size/2+5}" text-anchor="middle" font-size="11" fill="var(--ink3)" font-family="Nunito,sans-serif" font-weight="700">No data</text>
      </svg>`;
    }
    const total = segments.reduce((a,s)=>a+s.value,0);
    const cx=size/2, cy=size/2, r=size/2-10, inner=r-20;
    let angle=-Math.PI/2, paths='';
    segments.forEach(seg=>{
      if(!seg.value) return;
      const slice = (seg.value/total)*Math.PI*2;
      const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
      const x2=cx+r*Math.cos(angle+slice), y2=cy+r*Math.sin(angle+slice);
      const xi1=cx+inner*Math.cos(angle), yi1=cy+inner*Math.sin(angle);
      const xi2=cx+inner*Math.cos(angle+slice), yi2=cy+inner*Math.sin(angle+slice);
      const large=slice>Math.PI?1:0;
      paths+=`<path d="M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${inner} ${inner} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${seg.color}" opacity="0.9"/>`;
      angle+=slice;
    });
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`;
  }

  // Month pie: genres this month
  const monthTagCounts={};
  thisMonthBooks.forEach(b=>(b.tags||[]).forEach(t=>{monthTagCounts[t]=(monthTagCounts[t]||0)+1;}));
  const tagColors=['#c8703a','#5a8fd0','#5aaa6a','#9a5ab0','#d0aa3a','#d05a6a','#5aaab0'];
  const allTags=Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]);
  const monthPieSegs = allTags.slice(0,6).map(([name],i)=>({label:name,value:monthTagCounts[name]||0,color:tagColors[i%tagColors.length]})).filter(s=>s.value>0);
  if(!monthPieSegs.length) monthPieSegs.push({label:'No data',value:1,color:'var(--rose-fill)'});

  // Year pie
  const yearTagCounts={};
  thisYearBooks.forEach(b=>(b.tags||[]).forEach(t=>{yearTagCounts[t]=(yearTagCounts[t]||0)+1;}));
  const yearPieSegs = allTags.slice(0,6).map(([name],i)=>({label:name,value:yearTagCounts[name]||0,color:tagColors[i%tagColors.length]})).filter(s=>s.value>0);
  if(!yearPieSegs.length) yearPieSegs.push({label:'No data',value:1,color:'var(--rose-fill)'});

  const legendHTML = (segs) => segs.filter(s=>s.label!=='No data').map(s=>`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <div style="width:9px;height:9px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
      <span style="font-size:10px;font-weight:700;color:var(--ink2)">${esc(s.label)}</span>
      <span style="margin-left:auto;font-size:10px;color:var(--ink3);font-weight:700">${s.value}</span>
    </div>`).join('');

  return `
  <div class="goal-panel fade-in">
    <div class="goal-panel-row">
      <div class="gp-left">
        <div class="gp-title">Reading Goal ${curYear}</div>
        <div class="gp-track"><div class="gp-fill" style="width:${goalPct}%"></div></div>
        <div class="gp-sub">${read.length} of ${state.goal||12} books · ${Math.round(goalPct)}% complete · ${Math.max((state.goal||12)-read.length,0)} to go</div>
      </div>
      <div class="gp-pct">${Math.round(goalPct)}%</div>
      <button class="btn-secondary" style="width:auto;padding:8px 18px;margin-top:0;flex-shrink:0" onclick="openSetGoal()">Edit Goal</button>
    </div>
  </div>

  <div class="stats-top fade-in">
    <div class="stat-card"><div class="stat-num">${read.length}</div><div class="stat-label">Books read</div></div>
    <div class="stat-card"><div class="stat-num">${totalPages.toLocaleString()}</div><div class="stat-label">Pages read</div></div>
    <div class="stat-card"><div class="stat-num">${totalWords>=1000?(totalWords/1000).toFixed(0)+'k':totalWords}</div><div class="stat-label">Words read</div></div>
    <div class="stat-card"><div class="stat-num">${avgRating}★</div><div class="stat-label">Avg rating</div></div>
  </div>

  <div class="stats-row2 fade-in" style="grid-template-columns:1fr 1fr 1fr">
    <div class="stats-panel">
      <div class="sp-title">This Month</div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
        ${pieChart(monthPieSegs,100)}
        <div style="flex:1">
          <div style="font-family:'Playfair Display',serif;font-size:28px;color:var(--rose);line-height:1">${thisMonthBooks.length}</div>
          <div style="font-size:9px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">books</div>
          <div style="font-size:12px;font-weight:700;color:var(--ink)">${thisMonthPages.toLocaleString()} <span style="font-size:9px;color:var(--ink2);font-weight:700">pages</span></div>
          <div style="font-size:12px;font-weight:700;color:var(--ink)">${thisMonthWords>=1000?(thisMonthWords/1000).toFixed(0)+'k':thisMonthWords} <span style="font-size:9px;color:var(--ink2);font-weight:700">words</span></div>
        </div>
      </div>
      ${legendHTML(monthPieSegs)}
    </div>

    <div class="stats-panel">
      <div class="sp-title">This Year</div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
        ${pieChart(yearPieSegs,100)}
        <div style="flex:1">
          <div style="font-family:'Playfair Display',serif;font-size:28px;color:var(--rose);line-height:1">${thisYearBooks.length}</div>
          <div style="font-size:9px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">books</div>
          <div style="font-size:12px;font-weight:700;color:var(--ink)">${thisYearPages.toLocaleString()} <span style="font-size:9px;color:var(--ink2);font-weight:700">pages</span></div>
          <div style="font-size:12px;font-weight:700;color:var(--ink)">${thisYearWords>=1000?(thisYearWords/1000).toFixed(0)+'k':thisYearWords} <span style="font-size:9px;color:var(--ink2);font-weight:700">words</span></div>
        </div>
      </div>
      ${legendHTML(yearPieSegs)}
    </div>

    <div class="stats-panel">
      <div class="sp-title">By Tag</div>
      ${Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([name,count],i)=>{
        const p=PALETTE[(getTag(name)?.paletteIdx||0)%PALETTE.length];
        return `<div class="genre-bar-row">
          <div class="genre-bar-header"><span class="genre-bar-name">${esc(name)}</span><span class="genre-bar-count">${count} book${count===1?'':'s'}</span></div>
          <div class="genre-bar-track"><div class="genre-bar-fill" style="width:${Math.round(count/maxTag*100)}%;background:${p.color}"></div></div>
        </div>`;
      }).join('')||'<div style="color:var(--ink2)">No data yet</div>'}
    </div>
  </div>

  <div class="stats-row2 fade-in">
    <div class="stats-panel">
      <div class="sp-title">Books Read by Month (${curYear})</div>
      <div class="month-bars">${mCounts.map((c,i)=>`
        <div class="month-col">
          <div class="month-num">${c||''}</div>
          <div class="month-bar" style="height:${Math.max(c/maxM*80,c>0?8:3)}px;opacity:${i<=curMonth?1:0.3}"></div>
          <div class="month-lbl">${months[i].slice(0,1)}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="stats-panel">
      <div class="sp-title">All Time</div>

let editingBookId=null, editingTagId=null;
let modalStarRating=0, modalSpice=0, modalSelectedTags=[], modalCoverImg=null, modalStatus='tbr';
let newTagPaletteIdx=0;

function openModal(html) {

}
function closeModal() {

// ── BOOK MODAL ──
function openAddBook() { openAddBookWithStatus('tbr'); }
function openAddBookWithStatus(status) {
  editingBookId=null; modalStarRating=0; modalSpice=0;
  modalSelectedTags=[]; modalCoverImg=null; modalStatus=status;
  openModal(buildBookSearch(status));
}

function buildBookSearch(status) {
  return `
    <div class="modal-title">Add a Book</div>
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:stretch">
      <input id="addSearchInput" placeholder="Search by title or author…"
        style="flex:1;min-width:0;padding:10px 14px;background:rgba(255,255,255,0.8);border:1.5px solid var(--border);border-radius:11px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--ink);outline:none;box-sizing:border-box"
        onkeydown="if(event.key==='Enter')doAddSearch()"
        onfocus="this.style.borderColor='var(--rose)'" onblur="this.style.borderColor='var(--border)'">
      <button onclick="doAddSearch()"
        style="flex-shrink:0;padding:10px 18px;background:var(--rose);color:#fff;border:none;border-radius:11px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap">
        🔍 Search
      </button>
    </div>
    <div id="addSearchResults"></div>
    <div style="margin-top:12px;text-align:center">
      <span style="font-size:11px;color:var(--ink3)">Can't find it? </span>
      <button onclick="openAddBookForm(-1)" style="background:none;border:none;font-size:11px;color:var(--rose);font-weight:700;cursor:pointer;text-decoration:underline;font-family:inherit">Add manually</button>
    </div>`;
}

// Temp storage for search-selected book data
let _pendingBookData = {};

async function doAddSearch() {
  const raw = document.getElementById('addSearchInput')?.value.trim();
  if (!raw) { showToast('⚠️ Enter a title to search'); return; }
  const results = document.getElementById('addSearchResults');
  if (!results) { showToast('⚠️ Search not ready'); return; }
  results.innerHTML = '<div class="wtr-status">⏳ Searching…</div>';

  try {
    let books = null;

    // Google Books first — mirrors wtrAmazon exactly
    try {
      const resp = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(raw)}&maxResults=5&printType=books`);
      const data = await resp.json();
      if (data.items && data.items.length) {
        books = data.items.map(item => {
          const v = item.volumeInfo;
          return { title: v.title||'', author: v.authors?.[0]||'', pages: v.pageCount||0, coverImg: v.imageLinks?.thumbnail?.replace('http://','https://').replace('zoom=1','zoom=0').replace('&edge=curl','') || null, series:'', seriesOrder:'' };
        });
      }
    } catch(e) {}

    // Open Library fallback
    if (!books) {
      const resp = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(raw)}&limit=5&fields=title,author_name,number_of_pages_median,cover_i`);
      const data = await resp.json();
      if (data.docs && data.docs.length) {
        books = data.docs.map(d => ({ title:d.title, author:d.author_name?.[0]||'', pages:d.number_of_pages_median||0, coverImg:d.cover_i?`https://covers.openlibrary.org/b/id/${d.cover_i}-L.jpg`:null, series:'', seriesOrder:'' }));
      }
    }

    if (!books || !books.length) { results.innerHTML = '<div class="wtr-status">⚠️ No results — try a shorter title or add manually.</div>'; return; }

    // Series enrichment
    try {
      const list = books.map((b,i)=>`${i}: "${b.title}" by ${b.author}`).join(', ');
      const aiResp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:400,
          messages:[{ role:'user', content:`For each book return series name and book number or null if standalone. Respond ONLY with JSON array: [{"series":"Name","order":1},...]. Books: ${list}` }]
        })
      });
      const aiData = await aiResp.json();
      const arr = JSON.parse((aiData.content?.[0]?.text||'[]').replace(/```json|```/g,'').trim());
      books = books.map((b,i)=>({ ...b, series: arr[i]?.series||'', seriesOrder: arr[i]?.order||'' }));
    } catch(e) {}

    _pendingBookData = books;
    results.innerHTML = '<div class="wtr-status" style="margin-bottom:8px">Tap a result to fill in details:</div>' +
      books.map((b,i) => {
        const cover = b.coverImg
          ? `<img src="${b.coverImg}" style="width:38px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0" onerror="this.style.display='none'">`
          : `<div style="width:38px;height:56px;border-radius:6px;background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📖</div>`;
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:10px;border:1px solid var(--border2);cursor:pointer;margin-bottom:6px;transition:background 0.12s"
          onclick="openAddBookForm(${i})"
          onmouseover="this.style.background='var(--rose-light)'" onmouseout="this.style.background='var(--bg3)'">
          ${cover}
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:800;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(b.title)}</div>
            <div style="font-size:11px;color:var(--ink2);font-weight:600">${esc(b.author||'Unknown')}</div>
            ${b.series?`<div style="font-size:10px;color:var(--rose);font-weight:700;margin-top:2px">🔖 ${esc(b.series)}${b.seriesOrder?' #'+b.seriesOrder:''}</div>`:''}
            ${b.pages?`<div style="font-size:10px;color:var(--ink3);margin-top:1px">${b.pages} pages</div>`:''}
          </div>
          <div style="font-size:18px;color:var(--rose);flex-shrink:0">→</div>
        </div>`;
      }).join('');
  } catch(e) {
    results.innerHTML = `<div class="wtr-status">⚠️ Search failed: ${e.message}. Try adding manually.</div>`;
  }
}

function openAddBookForm(indexOrData) {
  const data = (typeof indexOrData === 'number' && indexOrData >= 0) ? (_pendingBookData[indexOrData] || {}) : (typeof indexOrData === 'object' ? indexOrData : {});
  modalCoverImg = data.coverImg || null;
  openModal(buildBookForm(null, data));
}
function openBookDetail(id) {
  const b=state.books.find(b=>b.id===id); if(!b) return;
  editingBookId=id; modalStarRating=b.rating||0; modalSpice=b.spice||0;
  modalSelectedTags=[...(b.tags||[])]; modalCoverImg=b.coverImg||null; modalStatus=b.status||'tbr';
  openModal(buildBookForm(b));
}

function buildBookForm(b=null, prefill={}) {
  // prefill is from search; b is an existing book being edited
  const pf = b || prefill;
  if (prefill.coverImg) modalCoverImg = prefill.coverImg;
  const statusPills=['tbr','reading','read'].map(s=>`
    <div class="status-pill ${modalStatus===s?'active':''}" onclick="setModalStatus('${s}')">
      ${s==='tbr'?'📋 Want to Read':s==='reading'?'📖 Reading':'✅ Read'}
    </div>`).join('');
  const tagPills=state.tags.map(tag=>{
    const p=PALETTE[tag.paletteIdx%PALETTE.length];
    const sel=modalSelectedTags.includes(tag.name);
    return `<div class="tag-pick-pill ${sel?'selected':''}"
      onclick="toggleModalTag('${esc(tag.name)}')"
      style="background:${p.bg};color:${p.color};border-color:${sel?p.color:p.border}">
      ${esc(tag.name)}</div>`;
  }).join('');
  const coverDisplay=modalCoverImg
    ?`<img src="${modalCoverImg}" class="cover-preview" onclick="triggerCoverUpload()">`
    :`<div class="cover-upload-area" onclick="triggerCoverUpload()">
        <span>${b?.coverEmoji||'📖'}</span><span class="cover-upload-label">Add Cover</span>
      </div>`;
  return `
    <input type="file" id="coverFileInput" accept="image/*" style="display:none" onchange="handleCoverUpload(event)">
    <div class="modal-title">${b?'Edit Book':'Add a Book'}</div>
    ${!b?`<button onclick="openAddBookWithStatus(modalStatus)" style="background:none;border:none;font-size:11px;color:var(--rose);font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px;padding:0">← Back to search</button>`:''}
    <div style="display:flex;gap:18px;margin-bottom:16px">
      ${coverDisplay}
      <div style="flex:1;min-width:0">
        <div class="form-group"><label class="form-label">Title</label>
          <input class="form-input" id="bTitle" placeholder="Book title…" value="${esc(pf?.title||'')}"></div>
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Author</label>
          <input class="form-input" id="bAuthor" placeholder="Author name…" value="${esc(pf?.author||'')}"></div>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Status</label>
      <div class="status-pills">${statusPills}</div></div>
    <div class="form-2col">
      <div class="form-group"><label class="form-label">Total Pages</label>
        <input class="form-input" id="bPages" type="number" placeholder="304" value="${pf?.pages||''}"></div>
      <div class="form-group"><label class="form-label">Current Page</label>
        <input class="form-input" id="bCurPage" type="number" placeholder="0" value="${b?.currentPage||0}"></div>
    </div>
    <div id="dateReadGroup" class="form-group" style="${modalStatus==='read'?'':'display:none'}">
      <label class="form-label">Date Finished</label>
      <input class="form-input" id="bDateRead" type="date" value="${b?.dateRead||todayISO()}"></div>
    <div class="form-2col">
      <div class="form-group"><label class="form-label">Series</label>
        <input class="form-input" id="bSeries" placeholder="Series name…" value="${esc(pf?.series||'')}"></div>
      <div class="form-group"><label class="form-label">Book #</label>
        <input class="form-input" id="bSeriesOrder" type="number" placeholder="1" value="${pf?.seriesOrder||''}"></div>
    </div>
    <div class="form-group"><label class="form-label">Tags</label>
      <div class="tag-picker" id="modalTagPicker">${tagPills}</div></div>
    <div class="form-2col">
      <div class="form-group"><label class="form-label">Rating</label>
        <div class="star-selector" id="modalStars">
          ${Array.from({length:5},(_,i)=>`<span class="star-sel ${i<modalStarRating?'filled':''}" onclick="setStar(${i+1})">★</span>`).join('')}
        </div></div>
      <div class="form-group"><label class="form-label">Spice 🌶️</label>
        <div class="pepper-selector" id="modalPeppers">
          ${Array.from({length:5},(_,i)=>`<span class="pepper-sel ${i<modalSpice?'filled':''}" onclick="setPepper(${i+1})">🌶️</span>`).join('')}
        </div></div>
    </div>
    <div class="form-group"><label class="form-label">Your Review / Notes</label>
      <textarea class="form-textarea" id="bNote" placeholder="Your thoughts, favourite quotes, feelings…">${esc(b?.note||'')}</textarea></div>
    <button class="btn-primary" onclick="saveBook()">${b?'Save Changes':'Add Book'}</button>
    ${b?`<hr class="divider">
    <button class="btn-secondary" onclick="moveToStatus(${b.id},'${b.status==='reading'?'read':b.status==='tbr'?'reading':'tbr'}')">
      ${b.status==='reading'?'✅ Mark as Read':b.status==='tbr'?'📖 Start Reading':'📋 Move to TBR'}
    </button>
    <button class="btn-secondary btn-danger" onclick="deleteBook(${b.id})">Delete Book</button>`:''}`;
}

function setModalStatus(s) {
  modalStatus=s;
  const drg=document.getElementById('dateReadGroup');
  if(drg) drg.style.display=s==='read'?'':'none';
  document.querySelectorAll('.status-pill').forEach(el=>{
    const t=el.textContent.trim();
    const es=t.includes('Reading')&&!t.includes('Want')?'reading':t.includes('Want')?'tbr':'read';
    el.classList.toggle('active',es===s);
  });
}
function toggleModalTag(name) {
  modalSelectedTags=modalSelectedTags.includes(name)?modalSelectedTags.filter(t=>t!==name):[...modalSelectedTags,name];
  const picker=document.getElementById('modalTagPicker');
  if(picker) picker.innerHTML=state.tags.map(tag=>{
    const p=PALETTE[tag.paletteIdx%PALETTE.length];
    const sel=modalSelectedTags.includes(tag.name);
    return `<div class="tag-pick-pill ${sel?'selected':''}" onclick="toggleModalTag('${esc(tag.name)}')"
      style="background:${p.bg};color:${p.color};border-color:${sel?p.color:p.border}">${esc(tag.name)}</div>`;
  }).join('');
}
function setStar(val) {
  modalStarRating=val;
  const c=document.getElementById('modalStars');
  if(c) c.innerHTML=Array.from({length:5},(_,i)=>`<span class="star-sel ${i<val?'filled':''}" onclick="setStar(${i+1})">★</span>`).join('');
}
function setPepper(val) {
  modalSpice=modalSpice===val?val-1:val;
  const c=document.getElementById('modalPeppers');
  if(c) c.innerHTML=Array.from({length:5},(_,i)=>`<span class="pepper-sel ${i<modalSpice?'filled':''}" onclick="setPepper(${i+1})">🌶️</span>`).join('');
}
function triggerCoverUpload() { document.getElementById('coverFileInput').click(); }
function handleCoverUpload(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    modalCoverImg=ev.target.result;
    const old=document.querySelector('.cover-upload-area')||document.querySelector('.cover-preview');
    if(old) old.outerHTML=`<img src="${modalCoverImg}" class="cover-preview" onclick="triggerCoverUpload()">`;
  };
  reader.readAsDataURL(file);
}
function saveBook() {
  const title=document.getElementById('bTitle')?.value.trim();
  if(!title){showToast('⚠️ Please enter a title');return;}
  const author=document.getElementById('bAuthor')?.value.trim()||'';
  const pages=parseInt(document.getElementById('bPages')?.value)||0;
  const curPage=parseInt(document.getElementById('bCurPage')?.value)||0;
  const progress=pages>0?Math.min(Math.round(curPage/pages*100),100):0;
  const dateRead=document.getElementById('bDateRead')?.value||null;
  const series=document.getElementById('bSeries')?.value.trim()||null;
  const seriesOrder=parseInt(document.getElementById('bSeriesOrder')?.value)||null;
  const note=document.getElementById('bNote')?.value.trim()||'';
  if(editingBookId) {
    const b=state.books.find(b=>b.id===editingBookId);
    if(b){Object.assign(b,{title,author,status:modalStatus,pages,currentPage:curPage,progress,rating:modalStarRating,spice:modalSpice,tags:modalSelectedTags,note,series,seriesOrder,dateRead:modalStatus==='read'?(dateRead||todayISO()):b.dateRead});if(modalCoverImg)b.coverImg=modalCoverImg;}
    showToast('✓ Book updated');
  } else {
    state.books.unshift({id:state.nextId++,title,author,status:modalStatus,coverEmoji:'📖',coverImg:modalCoverImg,tags:modalSelectedTags,rating:modalStarRating,spice:modalSpice,progress,pages,currentPage:curPage,note,series,seriesOrder,dateRead:modalStatus==='read'?(dateRead||todayISO()):null});
    showToast('📚 Book added!');
  }
  save(); closeModal(); renderContent();
}
function deleteBook(id) {
  if(!confirm('Remove this book?')) return;
  state.books=state.books.filter(b=>b.id!==id);
  save(); closeModal(); renderContent(); showToast('Removed');
}
function moveToStatus(id,newStatus) {
  const b=state.books.find(b=>b.id===id); if(!b) return;
  b.status=newStatus;
  if(newStatus==='read'&&!b.dateRead) b.dateRead=todayISO();
  if(newStatus==='read') b.progress=100;
  save(); closeModal(); renderContent();
  showToast(newStatus==='read'?'✅ Marked as read!':newStatus==='reading'?'📖 Happy reading!':'📋 Added to TBR');
}

// ── TAG MODAL ──
function openAddTag() { editingTagId=null; newTagPaletteIdx=Math.floor(Math.random()*PALETTE.length); openModal(buildTagForm()); }
function editTag(id) { const t=state.tags.find(t=>t.id===id); if(!t)return; editingTagId=id; newTagPaletteIdx=t.paletteIdx; openModal(buildTagForm(t)); }
function buildTagForm(tag=null) {
  const swatches=PALETTE.map((p,i)=>`<div class="color-swatch ${i===newTagPaletteIdx?'selected':''}" style="background:${p.color}" onclick="selectPalette(${i})"></div>`).join('');
  return `<div class="modal-title">${tag?'Edit Tag':'New Tag'}</div>
    <div class="form-group"><label class="form-label">Tag Name</label>
      <input class="form-input" id="tagName" placeholder="e.g. Thriller, Non-fiction…" value="${esc(tag?.name||'')}"></div>
    <div class="form-group"><label class="form-label">Colour</label>
      <div class="color-grid" id="colorGrid">${swatches}</div></div>
    <div style="margin-top:8px;padding:10px 14px;background:rgba(255,255,255,0.5);border-radius:10px;border:1px solid var(--border2);display:flex;align-items:center;gap:10px">
      <span style="font-size:10px;color:var(--ink2);font-weight:700;text-transform:uppercase;letter-spacing:1px">Preview:</span>
      <span id="tagPreview" class="bc-tag" style="background:${PALETTE[newTagPaletteIdx].bg};color:${PALETTE[newTagPaletteIdx].color};border:1px solid ${PALETTE[newTagPaletteIdx].border};font-size:11px;padding:3px 10px">
        ${esc(tag?.name||'My Tag')}
      </span>
    </div>
    <button class="btn-primary" style="margin-top:14px" onclick="saveTag()">${tag?'Save Changes':'Create Tag'}</button>
    ${tag?`<button class="btn-secondary btn-danger" onclick="deleteTag(${tag.id})">Delete Tag</button>`:''}`;
}
function selectPalette(idx) {
  newTagPaletteIdx=idx;
  document.querySelectorAll('.color-swatch').forEach((el,i)=>el.classList.toggle('selected',i===idx));
  const p=PALETTE[idx];
  const prev=document.getElementById('tagPreview');
  if(prev){prev.style.background=p.bg;prev.style.color=p.color;prev.style.borderColor=p.border;}
  const n=document.getElementById('tagName');
  if(n&&prev) prev.textContent=n.value||'My Tag';
}
function saveTag() {
  const name=document.getElementById('tagName')?.value.trim();
  if(!name){showToast('⚠️ Enter a tag name');return;}
  if(editingTagId){
    const t=state.tags.find(t=>t.id===editingTagId);
    if(t){t.name=name;t.paletteIdx=newTagPaletteIdx;}
    showToast('✓ Tag updated');
  } else {
    if(state.tags.find(t=>t.name.toLowerCase()===name.toLowerCase())){showToast('Tag already exists');return;}
    state.tags.push({id:state.nextId++,name,paletteIdx:newTagPaletteIdx});
    showToast('🏷️ Tag created!');
  }
  save(); closeModal(); renderContent();
}
function deleteTag(id) {
  const tag=state.tags.find(t=>t.id===id); if(!tag) return;
  if(!confirm(`Delete tag "${tag.name}"?`)) return;
  state.books.forEach(b=>{b.tags=(b.tags||[]).filter(t=>t!==tag.name);});
  state.tags=state.tags.filter(t=>t.id!==id);
  if(state.filterTag===tag.name) state.filterTag='All';
  save(); closeModal(); renderContent(); showToast('Tag deleted');
}

// ── GOAL MODAL ──
function openSetGoal() {
  openModal(`<div class="modal-title">Reading Goal</div>
    <div class="form-group"><label class="form-label">Books per year</label>
      <input class="form-input" id="goalInput" type="number" min="1" max="365" value="${state.goal||12}"></div>
    <button class="btn-primary" onclick="saveGoal()">Save Goal</button>`);
}
function saveGoal() {
  const g=parseInt(document.getElementById('goalInput')?.value);
  if(!g||g<1) return;
  state.goal=g; save(); closeModal(); renderContent(); showToast(`🎯 Goal: ${g} books`);
}

// Live tag name preview
document.addEventListener('input', e=>{
  if(e.target.id==='tagName'){const p=document.getElementById('tagPreview');if(p)p.textContent=e.target.value||'My Tag';}
